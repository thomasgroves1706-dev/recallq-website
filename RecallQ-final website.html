<script id="recallq-pages" type="application/json">{"home":"<!doctype html>\n<html lang=\"en-AU\">\n<head>\n<meta charset=\"utf-8\"/>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\"/>\n<title>RecallQ — Bring overdue patients back automatically.</title>\n<meta name=\"description\" content=\"AI patient recall for Australian dental, physio, and optometry practices. Recovered bookings, on autopilot.\"/>\n<style>\n/* RecallQ — Apple-style rebuild */\n@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');\n\n:root {\n  --bg:           #FFFFFF;\n  --bg-soft:      #F5F5F7;\n  --bg-dark:      #1A1915;\n  --bg-dark-soft: #2A2823;\n  --border:       #E6E6EA;\n  --border-dark:  rgba(255,255,255,0.12);\n\n  --ink:          #1A1915;\n  --ink-2:        #3A3833;\n  --ink-3:        #6E6C66;\n  --ink-4:        #A5A39C;\n\n  --accent:       #5876C4;\n  --accent-soft:  #8AA8E8;\n\n  /* Verticals (kept, used sparingly as accents) */\n  --dent:   #5C5A54;\n  --physio: #7A6A5C;\n  --opto:   #5A6470;\n\n  --maxw: 1200px;\n  --maxw-narrow: 880px;\n\n  --r-sm: 8px;\n  --r-md: 14px;\n  --r-lg: 22px;\n  --r-xl: 32px;\n\n  --ease: cubic-bezier(.22,1,.36,1);\n}\n\n*,*::before,*::after { box-sizing: border-box; }\nhtml,body { margin:0; padding:0; }\nhtml { scroll-behavior: smooth; }\nbody {\n  font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;\n  font-size: 17px;\n  line-height: 1.55;\n  color: var(--ink);\n  background: var(--bg);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\nimg, svg { display:block; max-width:100%; }\na { color: inherit; text-decoration: none; }\nbutton { font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit; }\n\n/* TYPE — Apple scale */\nh1,h2,h3,h4 {\n  font-weight: 600;\n  letter-spacing: -0.035em;\n  color: var(--ink);\n  margin: 0;\n  text-wrap: balance;\n  line-height: 1.05;\n}\nh1 { font-size: clamp(44px, 8vw, 104px); letter-spacing: -0.045em; font-weight: 600; }\nh2 { font-size: clamp(36px, 6vw, 72px); letter-spacing: -0.04em; font-weight: 600; }\nh3 { font-size: clamp(22px, 2.4vw, 30px); font-weight: 600; letter-spacing: -0.025em; line-height: 1.15; }\nh4 { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }\np  { margin: 0; }\n\n.display {\n  font-size: clamp(56px, 9vw, 120px);\n  letter-spacing: -0.05em;\n  font-weight: 600;\n  line-height: 0.98;\n  text-wrap: balance;\n}\n\n.lead {\n  font-size: clamp(19px, 1.6vw, 24px);\n  line-height: 1.4;\n  color: var(--ink-3);\n  font-weight: 400;\n  letter-spacing: -0.01em;\n  text-wrap: pretty;\n}\n\n.eyebrow {\n  font-size: 13px;\n  font-weight: 500;\n  color: var(--accent);\n  letter-spacing: -0.005em;\n  text-transform: none;\n}\n\n.fine { font-size: 13px; color: var(--ink-4); letter-spacing: -0.005em; }\n\n.accent { color: var(--accent); }\n.muted  { color: var(--ink-3); }\n\n.container { max-width: var(--maxw); margin: 0 auto; padding: 0 32px; }\n.container--narrow { max-width: var(--maxw-narrow); margin: 0 auto; padding: 0 32px; }\n.text-center { text-align: center; }\n\n/* MOTION */\n[data-anim] { opacity: 0; will-change: opacity, transform; }\n[data-anim].in { opacity: 1; transform: none; }\n[data-anim=\"fade-up\"]     { transform: translateY(36px); transition: opacity .9s var(--ease), transform .9s var(--ease); }\n[data-anim=\"fade-in\"]     { transition: opacity .8s var(--ease); }\n[data-anim=\"slide-left\"]  { transform: translateX(-40px); transition: opacity .9s var(--ease), transform .9s var(--ease); }\n[data-anim=\"slide-right\"] { transform: translateX(40px);  transition: opacity .9s var(--ease), transform .9s var(--ease); }\n[data-anim=\"scale-up\"]    { transform: scale(.94); transition: opacity .9s var(--ease), transform .9s var(--ease); }\n[data-stagger] > * { opacity: 0; transform: translateY(28px); transition: opacity .8s var(--ease), transform .8s var(--ease); }\n[data-stagger].in > * { opacity: 1; transform: none; }\n@media (prefers-reduced-motion: reduce) {\n  [data-anim], [data-stagger] > * { transition-duration: .01s !important; transform: none !important; }\n}\n\n/* HEADER — Apple-style: thin, sticky, blurred */\n.site-header {\n  position: sticky; top: 0; z-index: 50;\n  background: rgba(255,255,255,.72);\n  backdrop-filter: saturate(180%) blur(20px);\n  -webkit-backdrop-filter: saturate(180%) blur(20px);\n  border-bottom: .5px solid var(--border);\n  transition: opacity .4s, transform .4s;\n}\n.hdr-inner {\n  display: flex; align-items: center;\n  min-height: 48px; padding: 0;\n  gap: 32px;\n}\n.wordmark {\n  font-size: 21px; font-weight: 600; color: var(--ink);\n  letter-spacing: -0.025em;\n}\n.wordmark .q { color: var(--accent); }\n.nav { display: flex; gap: 28px; align-items: center; margin-left: auto; margin-right: 24px; }\n.nav a, .nav button {\n  color: var(--ink-2); font-size: 13px; font-weight: 400;\n  transition: color .2s; padding: 4px 0;\n}\n.nav a:hover, .nav button:hover { color: var(--ink); }\n.nav .nav-dd { position: relative; }\n.nav-dd > button { display: flex; align-items: center; gap: 4px; }\n.nav-dd .chev { width: 6px; height: 6px; border-right: 1.2px solid currentColor; border-bottom: 1.2px solid currentColor; transform: rotate(45deg); display: inline-block; margin-top: -3px; }\n.nav-dd-menu {\n  position: absolute; top: calc(100% + 10px); left: 50%; transform: translateX(-50%) translateY(-4px);\n  background: #fff; border: .5px solid var(--border); border-radius: 14px; padding: 10px;\n  box-shadow: 0 20px 40px -20px rgba(0,0,0,0.18);\n  min-width: 300px; opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s;\n}\n.nav-dd:hover .nav-dd-menu, .nav-dd:focus-within .nav-dd-menu { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }\n.nav-dd-menu a { display: flex; gap: 12px; padding: 10px 12px; border-radius: 10px; align-items: flex-start; }\n.nav-dd-menu a:hover { background: var(--bg-soft); }\n.nav-dd-menu a strong { display: block; color: var(--ink); font-weight: 500; font-size: 14px; letter-spacing: -0.01em; }\n.nav-dd-menu .sub-desc { display: block; color: var(--ink-3); font-size: 12px; margin-top: 2px; font-weight: 400; }\n.nav-dd-menu .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }\n\n/* BUTTONS */\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 6px;\n  font-weight: 500; font-size: 15px; letter-spacing: -0.01em;\n  padding: 11px 22px; border-radius: 980px; white-space: nowrap;\n  transition: background-color .25s, color .25s, transform .25s, border-color .25s;\n  cursor: pointer; line-height: 1;\n}\n.btn:hover { transform: scale(1.02); }\n.btn:active { transform: scale(.98); }\n.btn--primary { background: var(--ink); color: #fff; }\n.btn--primary:hover { background: var(--ink-2); }\n.btn--accent { background: var(--accent); color: #fff; }\n.btn--accent:hover { background: var(--accent-soft); }\n.btn--ghost { background: transparent; color: var(--ink); border: .5px solid var(--ink); }\n.btn--ghost:hover { background: var(--ink); color: #fff; }\n.btn--link { padding: 0; background: none; color: var(--accent); font-size: 15px; }\n.btn--link:hover { color: var(--accent-soft); }\n.btn--lg { padding: 14px 28px; font-size: 16px; }\n.btn--full { width: 100%; }\n.btn--invert { background: #fff; color: var(--ink); }\n.btn--invert:hover { background: rgba(255,255,255,.86); }\n\n/* Header hamburger (mobile) */\n.hamb { display: none; margin-left: auto; width: 40px; height: 40px; border-radius: 8px; align-items: center; justify-content: center; }\n.hamb span { display: block; width: 20px; height: 1.5px; background: var(--ink); position: relative; }\n.hamb span::before, .hamb span::after { content: \"\"; position: absolute; left: 0; right: 0; height: 1.5px; background: currentColor; }\n.hamb span::before { top: -6px; } .hamb span::after { top: 6px; }\n.mobile-menu { display: none; }\n\n@media (max-width: 820px) {\n  .nav { display: none; }\n  .hamb { display: inline-flex; }\n  .site-header .btn--primary { display: none; }\n  .mobile-menu { display: block; background: #fff; border-bottom: .5px solid var(--border); overflow: hidden; max-height: 0; transition: max-height .3s ease; }\n  .mobile-menu.open { max-height: 600px; }\n  .mobile-menu ul { list-style: none; padding: 16px 32px; margin: 0; display: flex; flex-direction: column; gap: 4px; }\n  .mobile-menu a, .mobile-menu button { display: block; padding: 12px 0; color: var(--ink); font-size: 16px; width: 100%; text-align: left; font-weight: 500; letter-spacing: -0.01em; }\n}\n\n/* SECTIONS — Apple-style big breathing room */\n.section {\n  padding: clamp(80px, 12vw, 180px) 0;\n  position: relative;\n}\n.section--soft  { background: var(--bg-soft); }\n.section--white { background: var(--bg); }\n.section--dark  { background: var(--bg-dark); color: #fff; }\n.section--dark h1, .section--dark h2, .section--dark h3 { color: #fff; }\n.section--dark .lead { color: rgba(255,255,255,.7); }\n.section--dark .eyebrow { color: var(--accent-soft); }\n.section--dark .fine { color: rgba(255,255,255,.5); }\n\n/* HERO — cinematic */\n.hero-cine {\n  position: relative;\n  min-height: 100svh;\n  padding: 128px 0 80px;\n  display: flex; align-items: center; justify-content: center;\n  overflow: hidden;\n  background: var(--bg);\n}\n.hero-cine .eyebrow { margin-bottom: 20px; display: inline-block; }\n.hero-cine h1 { max-width: 12ch; margin: 0 auto; }\n.hero-cine .lead { margin: 32px auto 0; max-width: 640px; }\n.hero-cine .ctas { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; margin-top: 48px; }\n.hero-cine .inner { position: relative; z-index: 2; text-align: center; }\n\n/* Cinematic hero animation stage */\n.cine-stage {\n  position: relative;\n  width: 100%; max-width: 880px; margin: 80px auto 0;\n  aspect-ratio: 16 / 9;\n  border-radius: var(--r-xl);\n  overflow: hidden;\n  background: var(--bg-soft);\n  box-shadow:\n    0 1px 2px rgba(0,0,0,0.04),\n    0 40px 80px -30px rgba(0,0,0,0.25);\n}\n\n/* SIMPLE HERO for sub-pages */\n.hero {\n  padding: clamp(120px, 16vw, 200px) 0 clamp(64px, 10vw, 120px);\n  text-align: center;\n}\n.hero .eyebrow { display: inline-block; margin-bottom: 18px; }\n.hero h1 { max-width: 15ch; margin: 0 auto 28px; }\n.hero .lead { margin: 0 auto 40px; max-width: 620px; }\n.hero .ctas { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; }\n.breadcrumb { font-size: 13px; color: var(--ink-4); margin-bottom: 24px; letter-spacing: -0.005em; }\n\n/* ONE-IDEA sections */\n.idea {\n  padding: clamp(80px, 14vw, 200px) 0;\n  text-align: center;\n}\n.idea .display { margin: 0 auto; max-width: 14ch; }\n.idea .lead { margin: 32px auto 0; max-width: 600px; }\n.idea--dark { background: var(--bg-dark); color: #fff; }\n.idea--dark .display { color: #fff; }\n.idea--soft { background: var(--bg-soft); }\n\n/* GRID — simpler, Apple-ish 2-up or 3-up tiles */\n.tiles-2, .tiles-3, .tiles-4 { display: grid; gap: 20px; }\n.tiles-2 { grid-template-columns: repeat(2, 1fr); }\n.tiles-3 { grid-template-columns: repeat(3, 1fr); }\n.tiles-4 { grid-template-columns: repeat(4, 1fr); }\n@media (max-width: 900px) { .tiles-2, .tiles-3, .tiles-4 { grid-template-columns: 1fr; } }\n\n.tile {\n  background: var(--bg-soft);\n  border-radius: var(--r-xl);\n  padding: 48px;\n  position: relative;\n  overflow: hidden;\n  min-height: 360px;\n  display: flex; flex-direction: column; justify-content: flex-end;\n  transition: transform .5s var(--ease);\n}\n.tile:hover { transform: translateY(-6px); }\n.tile--dark { background: var(--bg-dark); color: #fff; }\n.tile--dark h3 { color: #fff; }\n.tile--dark .tile-body { color: rgba(255,255,255,.7); }\n.tile--accent { background: #EEF1FA; }\n.tile .tile-eyebrow { font-size: 13px; font-weight: 500; color: var(--ink-3); margin-bottom: 10px; letter-spacing: -0.005em; }\n.tile--dark .tile-eyebrow { color: rgba(255,255,255,.55); }\n.tile h3 { margin-bottom: 14px; max-width: 16ch; }\n.tile .tile-body { color: var(--ink-3); font-size: 16px; line-height: 1.5; max-width: 34ch; }\n.tile .tile-cta { margin-top: 24px; color: var(--accent); font-size: 15px; font-weight: 500; display: inline-flex; align-items: center; gap: 4px; transition: gap .2s; }\n.tile:hover .tile-cta { gap: 10px; }\n\n/* STICKY SCROLL — pinned left, scrolling right */\n.stick {\n  position: relative;\n  padding: clamp(60px, 10vw, 140px) 0;\n}\n.stick-row {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 80px;\n  align-items: start;\n  max-width: 1200px;\n  margin: 0 auto;\n  padding: 0 32px;\n}\n.stick-pin {\n  position: sticky;\n  top: 12vh;\n  height: 80vh;\n  display: flex; align-items: center; justify-content: center;\n}\n.stick-pin-inner {\n  width: 100%;\n  aspect-ratio: 3/4;\n  max-width: 360px;\n  border-radius: 44px;\n  background: var(--bg-dark);\n  border: 8px solid #1A1915;\n  box-shadow: 0 40px 80px -30px rgba(0,0,0,.35);\n  overflow: hidden;\n  position: relative;\n}\n.stick-scenes { position: absolute; inset: 0; }\n.stick-scene { position: absolute; inset: 0; opacity: 0; transition: opacity .6s var(--ease); padding: 40px 24px; color: #fff; display: flex; flex-direction: column; }\n.stick-scene.on { opacity: 1; }\n\n.stick-beats { display: flex; flex-direction: column; gap: clamp(40vh, 48vh, 60vh); padding: 10vh 0; }\n.stick-beat h2 { font-size: clamp(32px, 4.5vw, 56px); margin-bottom: 20px; }\n.stick-beat p { font-size: 20px; color: var(--ink-3); max-width: 30ch; line-height: 1.45; }\n.stick-beat .num { font-size: 13px; font-weight: 500; color: var(--accent); margin-bottom: 16px; display: inline-block; }\n\n@media (max-width: 900px) {\n  .stick-row { grid-template-columns: 1fr; gap: 40px; }\n  .stick-pin { position: relative; top: 0; height: auto; padding: 40px 0; }\n  .stick-beats { gap: 80px; padding: 40px 0; }\n}\n\n/* ALTERNATING FULL-BLEED BLOCKS */\n.block {\n  padding: clamp(80px, 14vw, 180px) 0;\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 80px;\n  align-items: center;\n  max-width: 1200px;\n  margin: 0 auto;\n  padding-left: 32px; padding-right: 32px;\n}\n.block.rev { grid-template-columns: 1fr 1fr; }\n.block.rev .block-copy { order: 2; }\n.block.rev .block-vis { order: 1; }\n.block-copy .eyebrow { margin-bottom: 16px; display: inline-block; }\n.block-copy h2 { margin-bottom: 24px; }\n.block-copy p { font-size: 19px; color: var(--ink-3); line-height: 1.5; margin-bottom: 24px; max-width: 36ch; }\n.block-copy .btn { margin-top: 8px; }\n.block-vis {\n  border-radius: var(--r-xl);\n  background: var(--bg-soft);\n  aspect-ratio: 4/5;\n  overflow: hidden;\n  position: relative;\n}\n@media (max-width: 900px) {\n  .block, .block.rev { grid-template-columns: 1fr; gap: 40px; }\n  .block.rev .block-copy, .block.rev .block-vis { order: initial; }\n}\n\n/* KEY STATS */\n.stat-row {\n  display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px;\n  text-align: left;\n}\n.stat-row .stat-n {\n  font-size: clamp(60px, 8vw, 104px);\n  font-weight: 600;\n  letter-spacing: -0.05em;\n  line-height: 0.95;\n  font-variant-numeric: tabular-nums;\n}\n.stat-row .stat-l { font-size: 15px; color: var(--ink-3); margin-top: 12px; max-width: 26ch; line-height: 1.45; }\n.idea--dark .stat-row .stat-l { color: rgba(255,255,255,.6); }\n@media (max-width: 820px) { .stat-row { grid-template-columns: 1fr; gap: 48px; } }\n\n/* PRICING TEASER */\n.price-teaser {\n  background: var(--bg-soft);\n  border-radius: var(--r-xl);\n  padding: 72px 48px;\n  text-align: center;\n  max-width: 880px;\n  margin: 0 auto;\n}\n.price-teaser .amount {\n  font-size: clamp(56px, 8vw, 96px);\n  font-weight: 600;\n  letter-spacing: -0.045em;\n  line-height: 0.95;\n  margin: 24px 0 8px;\n}\n.price-teaser .per { color: var(--ink-3); font-size: 17px; margin-bottom: 32px; }\n.price-teaser ul { list-style: none; padding: 0; margin: 0 0 32px; display: flex; flex-wrap: wrap; justif : \"\"; position: absolute; inset: 0;\n  background: linear-gradient(135deg, rgba(26,25,21,0.55) 0%, rgba(26,25,21,0) 50%, rgba(26,25,21,0.5) 100%);\n}\n.editorial .e-overlay {\n  position: absolute; inset: 0;\n  display: flex; align-items: flex-end;\n  padding: 56px;\n  z-index: 2; color: #fff;\n}\n.editorial .e-overlay .quote { font-family: 'Fraunces', serif; font-style: italic; font-size: clamp(24px, 3vw, 38px); line-height: 1.2; letter-spacing: -0.02em; max-width: 22ch; font-weight: 500; }\n.editorial .e-overlay .who { font-size: 13px; opacity: .85; margin-top: 14px; font-weight: 500; letter-spacing: -0.005em; }\n\n.photo-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 1100px; margin: 0 auto; }\n.photo-strip .ps { aspect-ratio: 4/5; border-radius: 18px; overflow: hidden; position: relative; }\n.photo-strip .ps img { width: 100%; height: 100%; object-fit: cover; transition: transform .8s var(--ease); filter: saturate(.92); }\n.photo-strip .ps:hover img { transform: scale(1.04); }\n.photo-strip .ps .cap { position: absolute; bottom: 16px; left: 18px; right: 18px; color: #fff; font-size: 13px; font-weight: 500; letter-spacing: -0.005em; text-shadow: 0 2px 12px rgba(0,0,0,.6); z-index: 2; }\n.photo-strip .ps::after { content:\"\"; position:absolute; inset:0; background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,.55) 100%); }\n@media (max-width: 700px) { .photo-strip { grid-template-columns: 1fr; } }\n\n/* MAGNETIC BUTTON FX --------------------------------------- */\n.btn { position: relative; }\n\n/* SCROLL ZOOM HELPER --------------------------------------- */\n[data-scroll-zoom] { will-change: transform, opacity; }\n\n\n/* ============================================================\n   THREE ADDITIONS: section transitions, modal lift, parallax\n   ============================================================ */\n\n/* 1. ANIMATED CURVED SECTION TRANSITIONS ----------------- */\n/* SVG curves between sections, drawn in as user scrolls past */\n.section-curve {\n  position: relative;\n  width: 100%;\n  height: 90px;\n  display: block;\n  margin: -1px 0;\n  overflow: hidden;\n  pointer-events: none;\n}\n.section-curve svg {\n  position: absolute;\n  inset: 0;\n  width: 100%;\n  height: 100%;\n  display: block;\n}\n.section-curve .sweep-path {\n  stroke-dasharray: 2400;\n  stroke-dashoffset: 2400;\n  transition: stroke-dashoffset 1.4s var(--ease);\n}\n.section-curve.in .sweep-path { stroke-dashoffset: 0; }\n.section-curve .sweep-fill {\n  transform: translateY(100%);\n  transition: transform 1.1s var(--ease);\n}\n.section-curve.in .sweep-fill { transform: translateY(0); }\n\n/* 2. ELEVATED MODAL OPEN ------------------------------------ */\n/* Backdrop blur ramps up; modal scales/translates from below\n   with a subtle staggered field reveal. */\n.modal-backdrop {\n  /* override defaults from site.css */\n  background: rgba(15,14,11,0) !important;\n  backdrop-filter: blur(0) !important;\n  -webkit-backdrop-filter: blur(0) !important;\n  transition: background-color .5s var(--ease), backdrop-filter .5s var(--ease), opacity .4s var(--ease) !important;\n}\n.modal-backdrop.open {\n  background: rgba(15,14,11,0.55) !important;\n  backdrop-filter: saturate(140%) blur(14px) !important;\n  -webkit-backdrop-filter: saturate(140%) blur(14px) !important;\n}\n.modal-backdrop .modal {\n  transform: scale(.92) translateY(40px) !important;\n  opacity: 0 !important;\n  transition:\n    transform .65s cubic-bezier(0.22, 1, 0.36, 1),\n    opacity .45s ease !important;\n  box-shadow:\n    0 1px 2px rgba(0,0,0,.06),\n    0 30px 60px -10px rgba(0,0,0,.25),\n    0 60px 120px -20px rgba(0,0,0,.35);\n}\n.modal-backdrop.open .modal {\n  transform: scale(1) translateY(0) !important;\n  opacity: 1 !important;\n}\n\n/* Stagger the form fields */\n.modal-backdrop .modal h2,\n.modal-backdrop .modal .sub,\n.modal-backdrop .modal form > * {\n  opacity: 0;\n  transform: translateY(12px);\n  transition: opacity .5s var(--ease), transform .5s var(--ease);\n}\n.modal-backdrop.open .modal h2 { opacity: 1; transform: none; transition-delay: .15s; }\n.modal-backdrop.open .modal .sub { opacity: 1; transform: none; transition-delay: .22s; }\n.modal-backdrop.open .modal form > *:nth-child(1) { opacity: 1; transform: none; transition-delay: .30s; }\n.modal-backdrop.open .modal form > *:nth-child(2) { opacity: 1; transform: none; transition-delay: .36s; }\n.modal-backdrop.open .modal form > *:nth-child(3) { opacity: 1; transform: none; transition-delay: .42s; }\n.modal-backdrop.open .modal form > *:nth-child(4) { opacity: 1; transform: none; transition-delay: .48s; }\n.modal-backdrop.open .modal form > *:nth-child(5) { opacity: 1; transform: none; transition-delay: .54s; }\n.modal-backdrop.open .modal form > *:nth-child(6) { opacity: 1; transform: none; transition-delay: .60s; }\n.modal-backdrop.open .modal form > *:nth-child(7) { opacity: 1; transform: none; transition-delay: .66s; }\n.modal-backdrop.open .modal form > *:nth-child(8) { opacity: 1; transform: none; transition-delay: .72s; }\n\n/* Glow halo behind modal on entry */\n.modal-backdrop::before {\n  content: \"\";\n  position: absolute;\n  width: 600px; height: 600px;\n  left: 50%; top: 50%;\n  transform: translate(-50%, -50%) scale(.5);\n  background: radial-gradient(circle, rgba(88,118,196,.25) 0%, transparent 65%);\n  opacity: 0;\n  transition: opacity .9s var(--ease), transform .9s var(--ease);\n  pointer-events: none;\n}\n.modal-backdrop.open::before {\n  opacity: 1;\n  transform: translate(-50%, -50%) scale(1.2);\n}\n\n/* CTA button \"press\" feedback as it triggers modal */\n.btn--primary.firing, .btn--invert.firing, .btn--lg.firing {\n  transform: scale(.92) !important;\n  transition: transform .15s var(--ease) !important;\n}\n\n/* 3. PARALLAX EDITORIAL PHOTOS --------------------------- */\n.editorial { transform-style: preserve-3d; }\n.editorial img {\n  will-change: transform;\n  transition: none;\n  height: 130%;\n  top: -15%;\n}\n@media (prefers-reduced-motion: reduce) {\n  .editorial img { transform: none !important; }\n}\n\n/* Photo strip parallax */\n.photo-strip .ps img {\n  will-change: transform;\n}\n\n\n/* ============================================================\n   CONVERSION ADDITIONS\n   ============================================================ */\n\n/* TESTIMONIAL HERO --------------------------------------- */\n.testimonial-hero {\n  padding: clamp(80px, 12vw, 140px) 0;\n  background: #FFFFFF;\n}\n.th-grid {\n  display: grid;\n  grid-template-columns: 380px 1fr;\n  gap: 64px;\n  align-items: center;\n  max-width: 1100px;\n  margin: 0 auto;\n}\n@media (max-width: 880px) {\n  .th-grid { grid-template-columns: 1fr; gap: 32px; }\n}\n.th-photo {\n  position: relative;\n  border-radius: var(--r-xl);\n  overflow: hidden;\n  aspect-ratio: 4 / 5;\n  box-shadow: 0 30px 60px -20px rgba(0,0,0,.25);\n}\n.th-photo img {\n  width: 100%; height: 100%; object-fit: cover;\n  filter: saturate(.92);\n}\n.th-photo-tag {\n  position: absolute; bottom: 16px; left: 16px; right: 16px;\n  background: rgba(255,255,255,.95);\n  backdrop-filter: blur(20px);\n  -webkit-backdrop-filter: blur(20px);\n  padding: 12px 16px;\n  border-radius: 12px;\n  display: flex; align-items: center; gap: 12px;\n  font-size: 13px; font-weight: 500;\n  color: var(--ink-2);\n}\n.th-logo {\n  width: 36px; height: 36px;\n  background: var(--ink);\n  color: #fff;\n  border-radius: 8px;\n  display: inline-flex; align-items: center; justify-content: center;\n  font-weight: 600; letter-spacing: -0.02em;\n  font-size: 13px;\n  flex-shrink: 0;\n}\n.th-logo .th-d { opacity: .5; margin: 0 1px; }\n\n.th-stars {\n  color: #D4A341;\n  font-size: 16px;\n  letter-spacing: 4px;\n  margin-bottom: 24px;\n}\n.th-quote {\n  font-family: 'Fraunces', Georgia, serif;\n  font-style: italic;\n  font-size: clamp(24px, 2.6vw, 32px);\n  line-height: 1.35;\n  letter-spacing: -0.02em;\n  color: var(--ink);\n  margin: 0 0 32px;\n  font-weight: 400;\n}\n.th-quote mark {\n  background: linear-gradient(180deg, transparent 60%, rgba(88,118,196,.25) 60%);\n  color: inherit;\n  padding: 0 2px;\n}\n.th-attribution { margin-bottom: 32px; }\n.th-name {\n  font-size: 17px;\n  font-weight: 600;\n  letter-spacing: -0.01em;\n  color: var(--ink);\n}\n.th-role {\n  font-size: 14px;\n  color: var(--ink-3);\n  margin-top: 2px;\n}\n.th-meta {\n  font-size: 13px;\n  color: var(--ink-4);\n  margin-top: 6px;\n}\n.th-results {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 16px;\n  padding-top: 24px;\n  border-top: .5px solid var(--border);\n}\n.th-stat .n {\n  font-size: clamp(22px, 2.4vw, 28px);\n  font-weight: 600;\n  letter-spacing: -0.025em;\n  color: var(--accent);\n  line-height: 1;\n}\n.th-stat .l {\n  font-size: 12px;\n  color: var(--ink-3);\n  margin-top: 6px;\n  letter-spacing: -0.005em;\n}\n\n/* RECALL AUDIT ------------------------------------------- */\n.audit-section { background: #fff; }\n.audit-shell {\n  max-width: 1080px;\n  margin: 0 auto;\n}\n.audit-proof {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 1px;\n  background: var(--border);\n  border: .5px solid var(--border);\n  border-radius: 24px;\n  overflow: hidden;\n  margin-bottom: 20px;\n}\n.audit-proof-card {\n  background: #fff;\n  padding: clamp(28px, 4vw, 42px);\n  min-height: 180px;\n  display: flex;\n  flex-direction: column;\n  justify-content: space-between;\n}\n.audit-proof-card .n {\n  font-size: clamp(42px, 5vw, 68px);\n  line-height: .95;\n  letter-spacing: -0.045em;\n  font-weight: 600;\n  color: var(--accent);\n}\n.audit-proof-card .l {\n  color: var(--ink-3);\n  font-size: 15px;\n  line-height: 1.45;\n  max-width: 18ch;\n}\n.audit-flow {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  background: var(--bg-soft);\n  border-radius: 24px;\n  overflow: hidden;\n  border: .5px solid var(--border);\n}\n.audit-flow-copy {\n  padding: clamp(36px, 5vw, 64px);\n  display: flex;\n  flex-direction: column;\n  justify-content: center;\n}\n.audit-flow-copy h3 {\n  font-size: clamp(32px, 4vw, 52px);\n  max-width: 10ch;\n  margin-bottom: 22px;\n}\n.audit-flow-copy p {\n  color: var(--ink-3);\n  font-size: 18px;\n  line-height: 1.5;\n  max-width: 34ch;\n  margin-bottom: 32px;\n}\n.audit-steps {\n  background: var(--bg-dark);\n  padding: clamp(28px, 4vw, 48px);\n  display: grid;\n  gap: 12px;\n}\n.audit-step {\n  display: grid;\n  grid-template-columns: 44px 1fr;\n  gap: 16px;\n  align-items: start;\n  padding: 22px 0;\n  border-bottom: .5px solid rgba(255,255,255,.12);\n}\n.audit-step:last-child { border-bottom: 0; }\n.audit-step .num {\n  width: 34px;\n  height: 34px;\n  border-radius: 50%;\n  background: rgba(255,255,255,.1);\n  color: var(--accent-soft);\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  font-size: 12px;\n  font-weight: 600;\n}\n.audit-step h4 {\n  color: #fff;\n  font-size: 19px;\n  margin-bottom: 6px;\n}\n.audit-step p {\n  color: rgba(255,255,255,.62);\n  font-size: 15px;\n  line-height: 1.45;\n}\n@media (max-width: 880px) {\n  .audit-proof { grid-template-columns: 1fr; }\n  .audit-flow { grid-template-columns: 1fr; }\n}\n\n/* PARTNERSHIP VALUE -------------------------------------- */\n.partner-panel {\n  display: grid;\n  grid-template-columns: 1.05fr 1fr;\n  gap: 0;\n  background: #fff;\n  border: .5px solid var(--border);\n  border-radius: 24px;\n  overflow: hidden;\n  box-shadow: 0 1px 2px rgba(0,0,0,.04), 0 30px 60px -20px rgba(0,0,0,.18);\n  max-width: 1080px;\n  margin: 0 auto;\n}\n.partner-proof {\n  padding: clamp(36px, 5vw, 64px);\n  min-height: 520px;\n  display: flex;\n  flex-direction: column;\n  justify-content: flex-end;\n  background: var(--bg-dark);\n  color: #fff;\n}\n.partner-proof .proof-kicker {\n  font-size: 12px;\n  font-weight: 600;\n  letter-spacing: .08em;\n  text-transform: uppercase;\n  color: var(--accent-soft);\n  margin-bottom: auto;\n}\n.partner-proof .proof-number {\n  font-size: clamp(42px, 5vw, 72px);\n  line-height: .98;\n  letter-spacing: -0.045em;\n  font-weight: 600;\n  max-width: 9ch;\n}\n.partner-proof p {\n  color: rgba(255,255,255,.68);\n  font-size: 18px;\n  line-height: 1.48;\n  max-width: 32ch;\n  margin: 28px 0 34px;\n}\n.partner-proof .btn { align-self: flex-start; }\n.partner-cards {\n  display: grid;\n  grid-template-rows: repeat(3, 1fr);\n  background: #FAFAFC;\n}\n.partner-card {\n  padding: clamp(28px, 4vw, 48px);\n  display: flex;\n  flex-direction: column;\n  justify-content: center;\n  border-bottom: .5px solid var(--border);\n}\n.partner-card:last-child { border-bottom: 0; }\n.partner-card span {\n  color: var(--accent);\n  font-size: 13px;\n  font-weight: 600;\n  letter-spacing: .04em;\n  margin-bottom: 18px;\n}\n.partner-card h3 {\n  font-size: clamp(24px, 2.6vw, 34px);\n  margin-bottom: 12px;\n}\n.partner-card p {\n  color: var(--ink-3);\n  max-width: 34ch;\n  font-size: 16px;\n  line-height: 1.5;\n}\n@media (max-width: 880px) {\n  .partner-panel { grid-template-columns: 1fr; }\n  .partner-proof { min-height: auto; }\n  .partner-proof .proof-kicker { margin-bottom: 80px; }\n  .partner-cards { grid-template-rows: none; }\n}\n\n/* ROI CALCULATOR ----------------------------------------- */\n.roi-calc {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  background: #fff;\n  border-radius: 24px;\n  overflow: hidden;\n  box-shadow:\n    0 1px 2px rgba(0,0,0,.04),\n    0 30px 60px -20px rgba(0,0,0,.18);\n  border: .5px solid var(--border);\n  max-width: 1080px;\n  margin: 0 auto;\n}\n@media (max-width: 880px) {\n  .roi-calc { grid-template-columns: 1fr; }\n}\n.roi-inputs {\n  padding: clamp(32px, 4vw, 48px);\n  display: flex; flex-direction: column; gap: 28px;\n  background: #FAFAFC;\n  border-right: .5px solid var(--border);\n}\n@media (max-width: 880px) {\n  .roi-inputs { border-right: 0; border-bottom: .5px solid var(--border); }\n}\n.roi-field label {\n  display: block;\n  font-size: 12px;\n  font-weight: 500;\n  color: var(--ink-3);\n  letter-spacing: -0.005em;\n  margin-bottom: 12px;\n  text-transform: uppercase;\n  letter-spacing: 0.05em;\n}\n.roi-segment {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 4px;\n  background: #fff;\n  border: .5px solid var(--border);\n  border-radius: 12px;\n  padding: 4px;\n}\n.roi-segment button {\n  padding: 10px;\n  border-radius: 8px;\n  background: transparent;\n  color: var(--ink-3);\n  font-size: 14px;\n  font-weight: 500;\n  transition: background-color .25s var(--ease), color .25s var(--ease);\n}\n.roi-segment button.on {\n  background: var(--ink);\n  color: #fff;\n}\n.roi-slider-wrap {\n  display: flex;\n  align-items: center;\n  gap: 16px;\n}\n.roi-slider-wrap input[type=range] {\n  flex: 1;\n  -webkit-appearance: none;\n  appearance: none;\n  height: 4px;\n  background: var(--border);\n  border-radius: 2px;\n  outline: none;\n  cursor: grab;\n}\n.roi-slider-wrap input[type=range]::-webkit-slider-thumb {\n  -webkit-appearance: none;\n  width: 22px; height: 22px;\n  border-radius: 50%;\n  background: var(--accent);\n  border: 3px solid #fff;\n  box-shadow: 0 2px 8px rgba(88,118,196,.35);\n  cursor: grab;\n  transition: transform .15s var(--ease);\n}\n.roi-slider-wrap input[type=range]::-webkit-slider-thumb:active { transform: scale(1.15); cursor: grabbing; }\n.roi-slider-wrap input[type=range]::-moz-range-thumb {\n  width: 22px; height: 22px;\n  border-radius: 50%;\n  background: var(--accent);\n  border: 3px solid #fff;\n  box-shadow: 0 2px 8px rgba(88,118,196,.35);\n  cursor: grab;\n}\n.roi-out {\n  font-family: 'Inter', sans-serif;\n  font-variant-numeric: tabular-nums;\n  font-weight: 600;\n  font-size: 18px;\n  color: var(--ink);\n  min-width: 80px;\n  text-align: right;\n  letter-spacing: -0.015em;\n}\n.roi-assumption {\n  font-size: 12px;\n  color: var(--ink-4);\n  line-height: 1.5;\n  margin-top: 8px;\n  padding-top: 20px;\n  border-top: .5px solid var(--border);\n}\n\n.roi-output {\n  padding: clamp(32px, 4vw, 48px);\n  background: linear-gradient(180deg, #fff 0%, #F8F9FC 100%);\n  display: flex; flex-direction: column; gap: 24px;\n  position: relative;\n}\n.roi-result-l {\n  font-size: 12px;\n  font-weight: 500;\n  color: var(--ink-3);\n  letter-spacing: 0.05em;\n  text-transform: uppercase;\n  margin-bottom: 8px;\n}\n.roi-result-n {\n  font-family: 'Inter', sans-serif;\n  font-variant-numeric: tabular-nums;\n  font-size: clamp(48px, 6vw, 72px);\n  font-weight: 600;\n  color: var(--accent);\n  letter-spacing: -0.04em;\n  line-height: 1;\n  transition: color .3s var(--ease);\n}\n.roi-result-sub {\n  font-size: 14px;\n  color: var(--ink-3);\n  margin-top: 8px;\n}\n.roi-result-sub span {\n  font-variant-numeric: tabular-nums;\n  font-weight: 600;\n  color: var(--ink);\n}\n\n.roi-annual {\n  display: flex;\n  align-items: baseline;\n  justify-content: space-between;\n  padding: 16px 0;\n  border-top: .5px solid var(--border);\n}\n.roi-annual-l { font-size: 13px; color: var(--ink-3); }\n.roi-annual-n {\n  font-variant-numeric: tabular-nums;\n  font-size: 22px;\n  font-weight: 600;\n  letter-spacing: -0.02em;\n  color: var(--ink);\n}\n\n.roi-net {\n  background: rgba(88,118,196,.06);\n  border-radius: 14px;\n  padding: 18px 20px;\n  display: flex; flex-direction: column; gap: 8px;\n}\n.roi-net-row {\n  display: flex;\n  justify-content: space-between;\n  font-size: 14px;\n  color: var(--ink-3);\n  font-variant-numeric: tabular-nums;\n}\n.roi-net-row--total {\n  padding-top: 8px;\n  margin-top: 4px;\n  border-top: .5px solid rgba(88,118,196,.2);\n  font-size: 16px;\n  font-weight: 600;\n  color: var(--ink);\n}\n.roi-net-row--total span:last-child {\n  color: var(--accent);\n  font-size: 18px;\n}\n\n.roi-cta { margin-top: 8px; }\n.roi-cta .btn--full { width: 100%; }\n.roi-fine {\n  font-size: 11px;\n  color: var(--ink-4);\n  text-align: center;\n  margin-top: 12px;\n}\n\n/* secondary link variants */\n.btn--link-light { color: rgba(255,255,255,.85); }\n.btn--link-light:hover { color: #fff; }\n\n.th-grid--no-photo { grid-template-columns: 1fr !important; max-width: 760px; }\n.th-grid--no-photo .th-body { text-align: center; }\n.th-grid--no-photo .th-stars { text-align: center; }\n.th-grid--no-photo .th-results { text-align: left; }\n\n</style>\n\n</head>\n<body>\n\n<!-- ============================================================\n     HERO — Calendar fills, SMS flies past, scroll-zoom\n     ============================================================ -->\n<section class=\"hero-cine\" data-mount-stagger>\n  <div class=\"container\">\n    <div class=\"inner\">\n      <p class=\"eyebrow\" data-mount>AI patient recall. Built in Australia.</p>\n      <h1 data-mount>Bring overdue patients<br/>back automatically.</h1>\n      <p class=\"lead\" data-mount>RecallQ turns inactive patient lists into booked appointments, without adding admin to your team.</p>\n      <div class=\"ctas\" data-mount>\n        <button class=\"btn btn--primary btn--lg\" data-start-now>Start now</button>\n        <a class=\"btn btn--link\" href=\"#roi-calc\">Run this on my patient list →</a>\n      </div>\n    </div>\n\n    <!-- Calendar-fill stage with SMS fly-by -->\n    <div class=\"cal-stage\" data-mount data-cal-hero data-scroll-zoom>\n      <div class=\"cal-stage-inner\">\n        <div class=\"cal-head\">\n          <div class=\"month\">November</div>\n          <div class=\"week-lbl\">Live recall feed</div>\n        </div>\n        <div class=\"cal-grid\"><!-- generated --></div>\n      </div>\n      <div class=\"cal-counter\" data-cal-counter>\n        <span class=\"n\">0</span>\n        <span class=\"l\">bookings landed</span>\n      </div>\n    </div>\n\n    <p class=\"trust-strip\" data-mount style=\"margin-top:48px;\">\n      <span>Australian-owned</span><span class=\"sep\">·</span>\n      <span>AU data residency</span><span class=\"sep\">·</span>\n      <span>Privacy Act compliant</span><span class=\"sep\">·</span>\n      <span>Live in 20 minutes</span>\n    </p>\n  </div>\n</section>\n\n<!-- STAT IDEA -->\n<section class=\"idea idea--soft\">\n  <div class=\"container\">\n    <p class=\"eyebrow\" data-anim=\"fade-up\">The recall gap</p>\n    <h2 class=\"display\" data-anim=\"fade-up\" style=\"margin-top:12px;\">Twenty-seven percent of active patients are overdue.</h2>\n    <p class=\"lead\" data-anim=\"fade-up\">Your practice software knows. Your team doesn't always have time. Revenue slips away quietly.</p>\n  </div>\n</section>\n\n<!-- PARTNERSHIP VALUE — business upside -->\n<section class=\"section section--soft partner-value\" id=\"roi-calc\">\n  <div class=\"container\">\n    <div class=\"text-center\" style=\"margin-bottom: 56px;\">\n      <p class=\"eyebrow\" data-anim=\"fade-up\">The upside, with RecallQ</p>\n      <h2 data-anim=\"fade-up\" style=\"margin-top:16px;max-width:18ch;margin-left:auto;margin-right:auto;\">Your patient list is already worth more than you think.</h2>\n      <p class=\"lead\" data-anim=\"fade-up\">RecallQ helps turn overdue patients into booked revenue, without adding admin to your team.</p>\n    </div>\n    <div class=\"partner-panel\" data-anim=\"scale-up\">\n      <div class=\"partner-proof\">\n        <span class=\"proof-kicker\">What we unlock</span>\n        <div class=\"proof-number\">Revenue already sitting in your records.</div>\n        <p>Most practices have hundreds of patients who are overdue, inactive, or ready to return. We help find them, message them, and move the right replies back into your booking flow.</p>\n        <button class=\"btn btn--primary btn--lg\" data-start-now>Start now</button>\n      </div>\n      <div class=\"partner-cards\">\n        <div class=\"partner-card\">\n          <span>01</span>\n          <h3>Found revenue</h3>\n          <p>We surface the recall opportunities already hiding in your patient list.</p>\n        </div>\n        <div class=\"partner-card\">\n          <span>02</span>\n          <h3>Recovered bookings</h3>\n          <p>Personalised messages turn overdue patients into real appointment intent.</p>\n        </div>\n        <div class=\"partner-card\">\n          <span>03</span>\n          <h3>Less admin</h3>\n          <p>Your team spends less time chasing and more time with patients in the chair.</p>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- RECALL AUDIT — proof and process -->\n<section class=\"section audit-section\" id=\"recall-audit\">\n  <div class=\"container\">\n    <div class=\"text-center\" style=\"margin-bottom: 56px;\">\n      <p class=\"eyebrow\" data-anim=\"fade-up\">The recall audit</p>\n      <h2 data-anim=\"fade-up\" style=\"margin-top:16px;max-width:17ch;margin-left:auto;margin-right:auto;\">See the opportunity before you commit.</h2>\n      <p class=\"lead\" data-anim=\"fade-up\">We turn your existing patient list into a clear recovery plan, then launch only after your practice approves it.</p>\n    </div>\n\n    <div class=\"audit-shell\">\n      <div class=\"audit-proof\" data-stagger>\n        <div class=\"audit-proof-card\">\n          <div class=\"n\">3</div>\n          <div class=\"l\">practice types supported: dental, physio, and optometry.</div>\n        </div>\n        <div class=\"audit-proof-card\">\n          <div class=\"n\">0</div>\n          <div class=\"l\">new software your team has to learn before the audit.</div>\n        </div>\n        <div class=\"audit-proof-card\">\n          <div class=\"n\">1</div>\n          <div class=\"l\">clear recovery plan before messages go live.</div>\n        </div>\n      </div>\n\n      <div class=\"audit-flow\" data-anim=\"scale-up\">\n        <div class=\"audit-flow-copy\">\n          <h3>How the audit works.</h3>\n          <p>Simple enough for a busy practice, detailed enough to show where booked revenue can come from.</p>\n          <button class=\"btn btn--primary btn--lg\" data-start-now>Run this on my patient list</button>\n        </div>\n        <div class=\"audit-steps\">\n          <div class=\"audit-step\"><span class=\"num\">01</span><div><h4>Export your list</h4><p>Send a CSV from your practice system. No PMS lock-in required.</p></div></div>\n          <div class=\"audit-step\"><span class=\"num\">02</span><div><h4>Find overdue patients</h4><p>RecallQ identifies inactive, overdue, and high-value recall opportunities.</p></div></div>\n          <div class=\"audit-step\"><span class=\"num\">03</span><div><h4>Review the plan</h4><p>You see the segments, message style, and expected booking flow before launch.</p></div></div>\n          <div class=\"audit-step\"><span class=\"num\">04</span><div><h4>Recover bookings</h4><p>Personalised messages go out, replies are handled, and intent comes back to your team.</p></div></div>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- THE DASHBOARD — the real RecallQ UI -->\n<section class=\"section section--white\">\n  <div class=\"container\">\n    <div class=\"text-center\" style=\"margin-bottom: 64px;\">\n      <p class=\"eyebrow\" data-anim=\"fade-up\">The dashboard</p>\n      <h2 data-anim=\"fade-up\" style=\"margin-top:16px;max-width:18ch;margin-left:auto;margin-right:auto;\">Open RecallQ. See exactly what you got back.</h2>\n    </div>\n    <div data-anim=\"scale-up\">\n      <div class=\"dashboard-frame\">\n        <div class=\"dash-chrome\">\n          <div class=\"dots\"><span class=\"dot\"></span><span class=\"dot\"></span><span class=\"dot\"></span></div>\n          <div class=\"url\">app.recallq.com.au</div>\n        </div>\n        <div class=\"dash-app\">\n          <aside class=\"dash-side\">\n            <div class=\"brand\">Recall<span class=\"q\">Q</span></div>\n            <ul>\n              <li class=\"on\">Overview</li>\n              <li>Patients</li>\n              <li>Messages</li>\n              <li>Calendar</li>\n              <li>Reports</li>\n              <li>Settings</li>\n            </ul>\n          </aside>\n          <main class=\"dash-main\">\n            <div class=\"dash-h\">\n              <div>\n                <h3>Good morning.</h3>\n                <p style=\"color:var(--ink-3);font-size:13px;margin-top:4px;\">November overview · 24 days remaining</p>\n              </div>\n              <span class=\"pill\">↑ 18% vs October</span>\n            </div>\n            <div class=\"kpi-row\">\n              <div class=\"kpi\"><div class=\"l\">Recovered</div><div class=\"n\" data-drift=\"14820\" data-prefix=\"$\">$0</div><div class=\"delta\">+$3,180 this week</div></div>\n              <div class=\"kpi\"><div class=\"l\">Bookings</div><div class=\"n\" data-drift=\"73\">0</div><div class=\"delta\">+12 this week</div></div>\n              <div class=\"kpi\"><div class=\"l\">Reply rate</div><div class=\"n\" data-drift=\"42\" data-suffix=\"%\">0%</div><div class=\"delta\">Above avg.</div></div>\n              <div class=\"kpi\"><div class=\"l\">Patients reached</div><div class=\"n\" data-drift=\"412\">0</div><div class=\"delta\">86% deliverable</div></div>\n            </div>\n            <div class=\"dash-2col\">\n              <div class=\"dash-chart\">\n                <div class=\"lbl\">Recovered revenue · last 30 days</div>\n                <svg viewBox=\"0 0 400 140\" preserveAspectRatio=\"none\">\n                  <defs>\n                    <linearGradient id=\"dgrad\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                      <stop offset=\"0%\" stop-color=\"#5876C4\" stop-opacity=\".35\"/>\n                      <stop offset=\"100%\" stop-color=\"#5876C4\" stop-opacity=\"0\"/>\n                    </linearGradient>\n                  </defs>\n                  <path d=\"M0,120 L20,115 L40,108 L60,112 L80,98 L100,90 L120,82 L140,86 L160,72 L180,68 L200,55 L220,60 L240,48 L260,40 L280,42 L300,30 L320,28 L340,20 L360,15 L380,12 L400,10 L400,140 L0,140 Z\" fill=\"url(#dgrad)\"/>\n                  <path d=\"M0,120 L20,115 L40,108 L60,112 L80,98 L100,90 L120,82 L140,86 L160,72 L180,68 L200,55 L220,60 L240,48 L260,40 L280,42 L300,30 L320,28 L340,20 L360,15 L380,12 L400,10\" fill=\"none\" stroke=\"#5876C4\" stroke-width=\"2\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n                </svg>\n              </div>\n              <div class=\"dash-thread\">\n                <div class=\"lbl\"><span>Recent replies</span><span style=\"color:var(--accent);\">View all →</span></div>\n                <div class=\"row\"><div class=\"av\">SA</div><div><div class=\"nm\">Sarah A.</div><div class=\"ms\">Yes — Thursday 3pm works</div></div><span class=\"st st-yes\">Yes</span></div>\n                <div class=\"row\"><div class=\"av\">JT</div><div><div class=\"nm\">James T.</div><div class=\"ms\">Book me in for next week</div></div><span class=\"st st-yes\">Yes</span></div>\n                <div class=\"row\"><div class=\"av\">PR</div><div><div class=\"nm\">Priya R.</div><div class=\"ms\">Can we do morning?</div></div><span class=\"st st-yes\">Yes</span></div>\n                <div class=\"row\"><div class=\"av\">MH</div><div><div class=\"nm\">Mia H.</div><div class=\"ms\">Sent · awaiting reply</div></div><span class=\"st st-pen\">Pending</span></div>\n              </div>\n            </div>\n          </main>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- AI MESSAGE COMPOSER -->\n<section class=\"section section--soft\">\n  <div class=\"container\">\n    <div class=\"text-center\" style=\"margin-bottom: 56px;\">\n      <p class=\"eyebrow\" data-anim=\"fade-up\">Try it</p>\n      <h2 data-anim=\"fade-up\" style=\"margin-top:16px;max-width:18ch;margin-left:auto;margin-right:auto;\">Watch a recovery message write itself.</h2>\n      <p class=\"lead\" data-anim=\"fade-up\">No templates. Every message uses the patient's name, their last visit, and your practice voice.</p>\n    </div>\n    <div class=\"composer\" data-composer data-anim=\"scale-up\">\n      <div>\n        <h3>Patient context</h3>\n        <div class=\"field\">\n          <span class=\"lbl\">Patient name</span>\n          <input type=\"text\" data-c-name value=\"Sarah Anderson\"/>\n        </div>\n        <div class=\"field\">\n          <span class=\"lbl\">Practice type</span>\n          <select data-c-vertical>\n            <option value=\"dental\" selected>Dental</option>\n            <option value=\"physio\">Physiotherapy</option>\n            <option value=\"optometry\">Optometry</option>\n          </select>\n        </div>\n        <div class=\"field\">\n          <span class=\"lbl\">Last seen</span>\n          <select data-c-last>\n            <option value=\"6 weeks\">6 weeks ago</option>\n            <option value=\"3 months\">3 months ago</option>\n            <option value=\"6 months\" selected>6 months ago</option>\n            <option value=\"12 months\">12 months ago</option>\n            <option value=\"2 years\">2 years ago</option>\n          </select>\n        </div>\n        <div class=\"field\">\n          <span class=\"lbl\">Tone</span>\n          <select data-c-tone>\n            <option value=\"warm\" selected>Warm &amp; conversational</option>\n            <option value=\"direct\">Direct &amp; concise</option>\n          </select>\n        </div>\n      </div>\n      <div class=\"preview\">\n        <div class=\"meta\">SMS → +61 4xx xxx xxx</div>\n        <div class=\"bubble\" data-c-bubble></div>\n        <div class=\"reply\" data-c-reply>YES please</div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- VERTICALS — distinct typography per block -->\n<section class=\"section section--white\" style=\"padding-top: clamp(60px,10vw,120px); padding-bottom: 0;\">\n  <div class=\"container\" style=\"margin-bottom: 0; text-align:center;\">\n    <p class=\"eyebrow\" data-anim=\"fade-up\">One platform. Three practice types.</p>\n    <h2 data-anim=\"fade-up\" style=\"margin-top:16px;max-width:20ch;margin-left:auto;margin-right:auto;\">Built for dental, physio, and optometry recall.</h2>\n  </div>\n</section>\n\n<!-- DENTAL — editorial serif, warm stone -->\n<div class=\"v-block v-dent\" data-anim=\"fade-up\">\n  <div class=\"container-v\">\n    <div class=\"v-copy\">\n      <span class=\"v-eyebrow\">// DentistryIQ</span>\n      <h2 class=\"v-headline\">Six-month cleans, on autopilot.</h2>\n      <p class=\"v-body\">Personalised reminders using each patient's last visit and treatment history. Works with D4W, Exact, Core Practice, Praktika.</p>\n      <a class=\"v-cta\" href=\"dentistry.html\">Explore DentistryIQ →</a>\n    </div>\n    <div class=\"v-vis\">\n      <div class=\"v-sig\">\n        <div class=\"glyph\">\n          <svg viewBox=\"0 0 200 200\" fill=\"none\" stroke=\"#8C5A3A\" stroke-width=\"1\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n            <path d=\"M70 50 C 55 50 45 65 50 90 C 53 105 55 130 60 150 C 62 160 70 165 75 155 C 80 140 85 120 92 110 C 96 105 104 105 108 110 C 115 120 120 140 125 155 C 130 165 138 160 140 150 C 145 130 147 105 150 90 C 155 65 145 50 130 50 C 115 50 110 58 100 58 C 90 58 85 50 70 50 Z\"/>\n            <circle cx=\"100\" cy=\"80\" r=\"2\"/>\n          </svg>\n        </div>\n        <div class=\"card-on-top\">\n          <div class=\"body\">Hi Sarah, it's been 6 months since we last saw you. We'd love to help book your next clean when you're ready.</div>\n          <div class=\"pill-row-mini\"><span class=\"pill-mini pill-yes\">YES</span><span class=\"pill-mini pill-alt\">Reschedule</span></div>\n        </div>\n      </div>\n    </div>\n  </div>\n</div>\n\n<!-- PHYSIO -->\n<div class=\"v-block v-physio rev\" data-anim=\"fade-up\">\n  <div class=\"container-v\">\n    <div class=\"v-copy\">\n      <span class=\"v-eyebrow\">// PhysioIQ</span>\n      <h2 class=\"v-headline\">Treatment plans that finish.</h2>\n      <p class=\"v-body\">35% of physio patients drop off before finishing their plan. PhysioIQ nudges them back with messages referencing their condition and goals.</p>\n      <a class=\"v-cta\" href=\"phys // Force reflow so the transition starts from the pre-class initial state,\n        // avoiding a stuck \"pending\" transition in backgrounded/iframed load.\n        // eslint-disable-next-line no-unused-expressions\n        el.offsetHeight;\n        el.classList.add('in');\n        // per-child delays for staggered containers\n        if (el.hasAttribute('data-stagger')) {\n          const kids = el.children;\n          for (let i = 0; i < kids.length; i++) {\n            kids[i].style.transitionDelay = prefersReduced ? '0s' : (0.1 + i * 0.12) + 's';\n          }\n        }\n        // Fallback: finish stalled transitions after 900ms so opacity never sticks at 0.\n        setTimeout(() => {\n          const targets = el.hasAttribute('data-stagger') ? [el, ...el.children] : [el];\n          targets.forEach(t => {\n            if (t.getAnimations) {\n              t.getAnimations().forEach(a => {\n                if (a.playState === 'running' && a.startTime == null) { try { a.finish(); } catch(err){} }\n              });\n            }\n          });\n        }, 900);\n        io.unobserve(el);\n      }\n    });\n  }, { rootMargin: '-80px', threshold: 0.01 });\n\n  function register(root = document) {\n    root.querySelectorAll('[data-anim], [data-stagger]').forEach(el => {\n      if (el.dataset.animOn) return;\n      el.dataset.animOn = '1';\n      io.observe(el);\n    });\n  }\n\n  // Stagger on mount (hero): add 'hero-in' class which matches same rules\n  function mountStagger(root) {\n    const els = root.querySelectorAll('[data-mount]');\n    els.forEach((el, i) => {\n      el.style.transitionDelay = prefersReduced ? '0s' : (i * 0.1) + 's';\n      requestAnimationFrame(() => el.classList.add('in'));\n    });\n    // Safety: finish any stuck transitions (happens in backgrounded/iframed loads)\n    setTimeout(() => {\n      els.forEach(el => {\n        if (el.getAnimations) {\n          el.getAnimations().forEach(a => {\n            if (a.playState === 'running' && (a.currentTime === 0 || a.startTime == null)) {\n              try { a.finish(); } catch (err) {}\n            }\n          });\n        }\n      });\n    }, 1200);\n  }\n\n  function countUp(el, target, duration = 1800, prefix = '', suffix = '') {\n    if (prefersReduced) {\n      el.textContent = prefix + Math.round(target).toLocaleString() + suffix;\n      return;\n    }\n    const start = performance.now();\n    function frame(now) {\n      const t = Math.min((now - start) / duration, 1);\n      const eased = 1 - Math.pow(1 - t, 3);\n      const val = Math.round(target * eased);\n      el.textContent = prefix + val.toLocaleString() + suffix;\n      if (t < 1) requestAnimationFrame(frame);\n    }\n    requestAnimationFrame(frame);\n  }\n\n  function observeCount(el, target, opts = {}) {\n    const obs = new IntersectionObserver((entries) => {\n      entries.forEach(e => {\n        if (e.isIntersecting) {\n          countUp(el, target, opts.duration, opts.prefix, opts.suffix);\n          obs.unobserve(el);\n        }\n      });\n    }, { rootMargin: '-40px' });\n    obs.observe(el);\n  }\n\n  window.RQA = { register, mountStagger, countUp, observeCount, prefersReduced };\n\n  function init() {\n    register();\n    document.querySelectorAll('[data-mount-stagger]').forEach(c => mountStagger(c));\n    // Safety net: if for any reason transitions don't fire (background tab,\n    // bundled blob-script timing, etc.), force-reveal everything after 1.5s\n    // by disabling transitions and applying the end state directly.\n    setTimeout(() => {\n      document.querySelectorAll('[data-mount], [data-anim], [data-stagger]').forEach(el => {\n        const op = parseFloat(getComputedStyle(el).opacity);\n        if (op < 0.99) {\n          el.style.transition = 'none';\n          el.style.opacity = '1';\n          el.style.transform = 'none';\n          el.classList.add('in');\n        }\n      });\n    }, 1500);\n  }\n  if (document.readyState === 'loading') {\n    document.addEventListener('DOMContentLoaded', init);\n  } else {\n    init();\n  }\n  // Belt-and-braces: also run on window load in case DOMContentLoaded fired before this script.\n  window.addEventListener('load', () => {\n    if (!document.querySelector('[data-mount].in')) init();\n  });\n})();\n\n<\/script>\n<script>\n/* RecallQ Ad — self-contained 13s loop, IntersectionObserver-paused */\n(function () {\n  function mount(root) {\n    root.innerHTML = `\n      <div class=\"stage\">\n        <div class=\"act act1\">\n          <span class=\"ey\">THE RECALL GAP</span>\n          <h3>Your patients are <span style=\"color:#5876C4\">overdue</span>.</h3>\n          <div class=\"grid-dots\" id=\"rqaDots\"></div>\n          <p class=\"sub\">Your software tracks them. It doesn't bring them back.</p>\n        </div>\n        <div class=\"act act2\">\n          <span class=\"ey\">THE FIX</span>\n          <h3>AI brings them back — automatically.</h3>\n          <div class=\"act2-row\">\n            <div class=\"bubbles\">\n              <div class=\"bubble\" style=\"border-left-color:#5C5A54\">Hi Sarah, it's been 6 months since your last clean. Reply YES to book a time.</div>\n              <div class=\"reply\" style=\"background:#5C5A54\">YES</div>\n              <div class=\"bubble\" style=\"border-left-color:#7A6A5C\">Hi Tom, 3 weeks since your last session — how's the shoulder? Reply YES to book a review.</div>\n              <div class=\"reply\" style=\"background:#7A6A5C\">YES</div>\n              <div class=\"bubble\" style=\"border-left-color:#5A6470\">Hi Linh, your last eye exam was 23 months ago. Your rebate resets in 4 weeks — reply YES.</div>\n              <div class=\"reply\" style=\"background:#5A6470\">YES</div>\n            </div>\n            <div class=\"vtags\">\n              <div class=\"vtag\" data-v=\"0\"><span class=\"vdot\" style=\"background:#5C5A54\"></span>DentistryIQ</div>\n              <div class=\"vtag\" data-v=\"1\"><span class=\"vdot\" style=\"background:#7A6A5C\"></span>PhysioIQ</div>\n              <div class=\"vtag\" data-v=\"2\"><span class=\"vdot\" style=\"background:#5A6470\"></span>OptometryIQ</div>\n            </div>\n          </div>\n        </div>\n        <div class=\"act act3\">\n          <span class=\"ey\">THE RESULT</span>\n          <div class=\"money\" id=\"rqaMoney\">$0</div>\n          <p class=\"subline\">Recovered this month — from patients you'd already earned.</p>\n          <div class=\"closeblk\">\n            <div class=\"wm\">Recall<span class=\"q\">Q</span></div>\n            <button class=\"btn btn--primary\" data-start-now>Start now</button>\n            <div class=\"tag\">recallq.com.au · Made in Australia</div>\n          </div>\n        </div>\n        <div class=\"progress\" id=\"rqaProg\"></div>\n      </div>\n    `;\n\n    // Build dot grid\n    const grid = root.querySelector('#rqaDots');\n    const total = 120;\n    for (let i = 0; i < total; i++) grid.appendChild(document.createElement('span'));\n\n    const act1 = root.querySelector('.act1');\n    const act2 = root.querySelector('.act2');\n    const act3 = root.querySelector('.act3');\n    const bubbles = act2.querySelectorAll('.bubble');\n    const replies = act2.querySelectorAll('.reply');\n    const vtags = act2.querySelectorAll('.vtag');\n    const money = root.querySelector('#rqaMoney');\n    const prog = root.querySelector('#rqaProg');\n    const dots = grid.querySelectorAll('span');\n\n    let timers = [];\n    let running = false;\n    let progStart = 0;\n    let progRaf;\n\n    function clearAll() {\n      timers.forEach(clearTimeout);\n      timers = [];\n      cancelAnimationFrame(progRaf);\n      [act1, act2, act3].forEach(a => a.classList.remove('on'));\n      dots.forEach(d => d.classList.remove('hi'));\n      bubbles.forEach(b => b.classList.remove('on'));\n      replies.forEach(r => r.classList.remove('on'));\n      vtags.forEach(v => v.classList.remove('on'));\n      money.textContent = '$0';\n      prog.style.width = '0%';\n    }\n\n    function animateMoney(target, dur) {\n      const start = performance.now();\n      function step(now) {\n        const t = Math.min((now - start) / dur, 1);\n        const eased = 1 - Math.pow(1 - t, 3);\n        money.textContent = '$' + Math.round(target * eased).toLocaleString();\n        if (t < 1) requestAnimationFrame(step);\n      }\n      requestAnimationFrame(step);\n    }\n\n    function tick(now) {\n      const elapsed = now - progStart;\n      const pct = Math.min(elapsed / 13000, 1) * 100;\n      prog.style.width = pct + '%';\n      if (pct < 100 && running) progRaf = requestAnimationFrame(tick);\n    }\n\n    function play() {\n      if (running) return;\n      running = true;\n      clearAll();\n      progStart = performance.now();\n      progRaf = requestAnimationFrame(tick);\n\n      // ACT 1: 0 - 4s\n      timers.push(setTimeout(() => act1.classList.add('on'), 100));\n      // Light up ~32 dots starting at 1000ms, 55ms apart\n      const picks = [];\n      while (picks.length < 32) {\n        const idx = Math.floor(Math.random() * total);\n        if (!picks.includes(idx)) picks.push(idx);\n      }\n      picks.forEach((idx, i) => timers.push(setTimeout(() => dots[idx].classList.add('hi'), 1000 + i * 55)));\n\n      // Fade out act1 at 4400ms\n      timers.push(setTimeout(() => act1.classList.remove('on'), 4400));\n\n      // ACT 2: 5100 - 9500\n      timers.push(setTimeout(() => act2.classList.add('on'), 5100));\n      [0, 1, 2].forEach(i => {\n        const base = 5100 + 800 + i * 750;\n        timers.push(setTimeout(() => { bubbles[i * 2].classList.add('on'); }, base));\n        timers.push(setTimeout(() => { replies[i].classList.add('on'); vtags[i].classList.add('on'); }, base + 430));\n      });\n      timers.push(setTimeout(() => act2.classList.remove('on'), 9600));\n\n      // ACT 3: 10300 - 13000\n      timers.push(setTimeout(() => {\n        act3.classList.add('on');\n        animateMoney(3200, 1700);\n      }, 10300));\n\n      // Loop\n      timers.push(setTimeout(() => {\n        running = false;\n        play();\n      }, 13000 + 2600));\n    }\n\n    function stop() {\n      running = false;\n      clearAll();\n    }\n\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach(e => {\n        if (e.intersectionRatio >= 0.5) play();\n        else stop();\n      });\n    }, { threshold: [0, 0.5] });\n    io.observe(root);\n  }\n\n  document.querySelectorAll('[data-recallq-ad]').forEach(mount);\n})();\n\n<\/script>\n<script data-active=\"home\">\n/* RecallQ — header, footer, Start Now modal\n   Usage: <script src=\"assets/partials.js\"\n          data-active=\"home|dentistry|physio|optometry|how|pricing|about|legal\"\n          data-vertical=\"Dentistry|Physio|Optometry\" (optional modal preset)\n          data-depth=\"0|1\"><\\/script>\n*/\n(function () {\n  const me = document.currentScript;\n  const active = me?.dataset.active || '';\n  const vPreset = me?.dataset.vertical || '';\n  const depth = (parseInt(me?.dataset.depth || '0', 10)) || 0;\n  const up = '../'.repeat(depth);\n  const ver = '?v=g1';\n\n  // HEADER\n  const hdr = document.createElement('div');\n  hdr.innerHTML = `\n    <header class=\"site-header\" id=\"siteHeader\">\n      <div class=\"container hdr-inner\">\n        <a class=\"wordmark\" href=\"${up}index.html\" aria-label=\"RecallQ home\">Recall<span class=\"q\">Q</span></a>\n        <nav class=\"nav\" aria-label=\"Primary\">\n          <div class=\"nav-dd\">\n            <button aria-haspopup=\"true\" aria-expanded=\"false\">Solutions</button>\n            <div class=\"nav-dd-menu\" role=\"menu\">\n              <a href=\"${up}dentistry.html\"><span class=\"dot\" style=\"background:#5C5A54\"></span><span><strong>DentistryIQ</strong><span class=\"sub-desc\">Recall for dental practices</span></span></a>\n              <a href=\"${up}physio.html\"><span class=\"dot\" style=\"background:#7A6A5C\"></span><span><strong>PhysioIQ</strong><span class=\"sub-desc\">Recall for physiotherapy</span></span></a>\n              <a href=\"${up}optometry.html\"><span class=\"dot\" style=\"background:#5A6470\"></span><span><strong>OptometryIQ</strong><span class=\"sub-desc\">Recall for optometry</span></span></a>\n            </div>\n          </div>\n          <a href=\"${up}how-it-works.html\">How it works</a>\n          <a href=\"${up}pricing.html\">Pricing</a>\n          <a href=\"${up}about.html\">About</a>\n        </nav>\n        <button class=\"btn btn--primary\" data-start-now>Start now</button>\n        <button class=\"hamb\" aria-label=\"Menu\" id=\"hambBtn\"><span></span></button>\n      </div>\n      <div class=\"mobile-menu\" id=\"mobileMenu\">\n        <ul>\n          <li><a href=\"${up}dentistry.html\"><span class=\"dot\" style=\"background:#5C5A54;margin-right:8px;display:inline-block;\"></span>DentistryIQ</a></li>\n          <li><a href=\"${up}physio.html\"><span class=\"dot\" style=\"background:#7A6A5C;margin-right:8px;display:inline-block;\"></span>PhysioIQ</a></li>\n          <li><a href=\"${up}optometry.html\"><span class=\"dot\" style=\"background:#5A6470;margin-right:8px;display:inline-block;\"></span>OptometryIQ</a></li>\n          <li><a href=\"${up}how-it-works.html\">How it works</a></li>\n          <li><a href=\"${up}pricing.html\">Pricing</a></li>\n          <li><a href=\"${up}about.html\">About</a></li>\n          <li><button data-start-now style=\"color:var(--periwinkle-dark);font-weight:500;\">Start now →</button></li>\n        </ul>\n      </div>\n    </header>\n  `;\n  document.body.insertBefore(hdr.firstElementChild, document.body.firstChild);\n  // Double-rAF + forced reflow to guarantee the transition starts from the initial state.\n  // Without this, iframes that are backgrounded on load can stall the transition in\n  // \"pending\" state (playState:running, startTime:null) and opacity stays at 0 forever.\n  const hdrEl = document.getElementById('siteHead
