e: 32px; font-weight: 600; letter-spacing: -0.03em; color: var(--ink); font-variant-numeric: tabular-nums; margin-bottom: 16px; }\ninput[type=\"range\"] { width: 100%; accent-color: var(--accent); }\n.roi-out { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-top: 28px; }\n.roi-out .box { background: #fff; border-radius: 14px; padding: 20px; }\n.roi-out .n { font-size: 28px; font-weight: 600; color: var(--accent); font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }\n.roi-out .l { font-size: 11px; color: var(--ink-4); text-transform: uppercase; letter-spacing: .1em; margin-top: 6px; }\n\n/* FAQ */\n.faq { max-width: 720px; margin: 0 auto; }\n.faq-item { border-bottom: .5px solid var(--border); }\n.faq-item summary { list-style: none; cursor: pointer; padding: 22px 0; font-size: 17px; color: var(--ink); font-weight: 500; display: flex; justify-content: space-between; align-items: center; gap: 16px; letter-spacing: -0.015em; }\n.faq-item summary::-webkit-details-marker { display: none; }\n.faq-item summary::after { content: \"+\"; font-size: 24px; font-weight: 300; color: var(--ink-3); transition: transform .3s; }\n.faq-item[open] summary::after { transform: rotate(45deg); }\n.faq-item .a { padding: 0 0 22px; color: var(--ink-3); font-size: 15px; line-height: 1.6; }\n\n.illo-ph { aspect-ratio: 4/3; border-radius: var(--r-lg); background: var(--bg-soft); display: flex; align-items: center; justify-content: center; color: var(--ink-4); font-family: ui-monospace, monospace; font-size: 12px; }\n\n/* Timeline (how it works) */\n.timeline { max-width: 760px; margin: 0 auto; position: relative; }\n.timeline::before { content:\"\"; position: absolute; left: 20px; top: 0; bottom: 0; width: 1px; background: var(--border); }\n.tstep { display: grid; grid-template-columns: 48px 1fr; gap: 24px; padding: 24px 0; position: relative; }\n.tstep .n { width: 36px; height: 36px; border-radius: 50%; background: var(--ink); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 500; position: relative; z-index: 1; }\n.tstep h3 { font-size: 20px; margin-bottom: 8px; }\n.tstep p { font-size: 15px; color: var(--ink-3); max-width: 52ch; line-height: 1.55; }\n\n/* Pricing cards */\n.price-card { padding: 36px; border-radius: var(--r-xl); background: var(--bg-soft); }\n.price-card .badge { font-size: 12px; letter-spacing: -0.005em; color: var(--ink-3); margin-bottom: 18px; display: inline-block; }\n.price-card.featured { background: var(--ink); color: #fff; }\n.price-card.featured h3, .price-card.featured .amount { color: #fff; }\n.price-card.featured .badge { background: var(--accent); color: #fff; padding: 4px 10px; border-radius: 980px; }\n.price-card.featured .per, .price-card.featured .gst, .price-card.featured li { color: rgba(255,255,255,.75); }\n.price-card .amount { font-size: 48px; font-weight: 600; color: var(--ink); letter-spacing: -0.04em; line-height: 1; }\n.price-card .per { font-size: 17px; color: var(--ink-3); font-weight: 400; }\n.price-card .gst { font-size: 12px; color: var(--ink-4); margin-top: 4px; margin-bottom: 24px; }\n.price-card ul { list-style: none; margin: 24px 0; padding: 0; display: flex; flex-direction: column; gap: 12px; }\n.price-card li { font-size: 14px; color: var(--ink-3); display: flex; gap: 10px; align-items: flex-start; line-height: 1.4; }\n.price-card li::before { content: \"✓\"; color: var(--accent); font-weight: 600; flex-shrink: 0; }\n\n/* Focus ring */\na:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, summary:focus-visible {\n  outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 6px;\n}\n\n/* Prose */\n.prose { max-width: 680px; margin: 0 auto; }\n.prose p { font-size: 17px; color: var(--ink-2); line-height: 1.75; margin-bottom: 20px; }\n.prose h2 { margin-top: 40px; margin-bottom: 14px; font-size: 28px; }\n\n/* Subs table */\ntable.subs { width: 100%; border-collapse: collapse; font-size: 14px; }\ntable.subs th, table.subs td { text-align: left; padding: 14px 12px; }\ntable.subs th { color: var(--ink); font-weight: 500; border-bottom: 1px solid var(--border); }\ntable.subs td { border-bottom: .5px solid var(--border); color: var(--ink-3); }\n\n/* Integration chips */\n.integ-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 24px; }\n.integ-label { font-size: 12px; letter-spacing: -0.005em; color: var(--ink-4); text-align: center; margin-bottom: 14px; }\n.integ-chip { padding: 8px 16px; border-radius: 980px; font-size: 13px; color: var(--ink-3); background: var(--bg-soft); border: .5px solid var(--border); }\n\n/* Live strip (hero inline) — keep for compatibility, restyled */\n.live-strip { margin: 24px auto 0; display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; background: var(--bg-soft); border-radius: 980px; padding: 8px 18px; font-size: 13px; color: var(--ink-3); letter-spacing: -0.005em; }\n.live-strip strong { color: var(--ink); font-weight: 600; font-variant-numeric: tabular-nums; }\n.live-strip .lc-dot { width: 8px; height: 8px; border-radius: 50%; background: #3FBF73; box-shadow: 0 0 0 0 rgba(63,191,115,.7); animation: lcPulse 1.8s ease-out infinite; }\n.live-strip .lc-sep { opacity: .4; }\n@keyframes lcPulse { 0%{box-shadow:0 0 0 0 rgba(63,191,115,.55);} 70%{box-shadow:0 0 0 10px rgba(63,191,115,0);} 100%{box-shadow:0 0 0 0 rgba(63,191,115,0);} }\n\n/* Hero inline anim wrappers (legacy helpers) */\n[data-mount]{opacity:0;transform:translateY(24px);transition:opacity .8s var(--ease),transform .8s var(--ease);}\n[data-mount].in{opacity:1;transform:none;}\n\n/* RecallQAd component (restyled, Apple-ish) */\n.rqa {\n  position: relative; max-width: 900px; margin: 0 auto;\n  aspect-ratio: 16 / 9;\n  background: var(--bg-soft); border-radius: var(--r-xl); overflow: hidden;\n  box-shadow: 0 1px 2px rgba(0,0,0,.04), 0 40px 80px -30px rgba(0,0,0,.2);\n}\n.rqa .act { position: absolute; inset: 0; padding: 56px; display: flex; flex-direction: column; justify-content: center; opacity: 0; transition: opacity .5s ease; }\n.rqa .act.on { opacity: 1; }\n.rqa .act .ey { font-size: 13px; color: var(--accent); margin-bottom: 18px; font-weight: 500; opacity: 0; transform: translateY(-6px); transition: opacity .5s, transform .5s; }\n.rqa .act.on .ey { opacity: 1; transform: none; }\n.rqa .act h3 { font-size: clamp(28px, 4vw, 48px); font-weight: 600; color: var(--ink); line-height: 1.05; letter-spacing: -0.035em; opacity: 0; transform: translateY(-6px); transition: opacity .5s, transform .5s; transition-delay: .1s; max-width: 18ch; }\n.rqa .act.on h3 { opacity: 1; transform: none; }\n.rqa .act .sub { color: var(--ink-3); font-size: 16px; margin-top: 20px; opacity: 0; transform: translateY(-6px); transition: opacity .5s, transform .5s; transition-delay: 2.8s; }\n.rqa .act.on .sub { opacity: 1; transform: none; }\n\n.rqa .grid-dots { display: grid; grid-template-columns: repeat(24, 1fr); gap: 6px; margin-top: 28px; max-width: 520px; opacity: 0; transition: opacity .5s ease; transition-delay: .4s; }\n.rqa .act.on .grid-dots { opacity: 1; }\n.rqa .grid-dots span { width: 100%; aspect-ratio: 1; background: var(--border); border-radius: 50%; transition: background-color .3s ease; }\n.rqa .grid-dots span.hi { background: var(--accent); }\n\n.rqa .act2-row { display: flex; gap: 32px; margin-top: 24px; align-items: flex-start; flex-wrap: wrap; }\n.rqa .bubbles { flex: 1; min-width: 260px; max-width: 400px; display: flex; flex-direction: column; gap: 10px; }\n.rqa .bubble { background: #fff; border-radius: 14px 14px 14px 4px; padding: 12px 16px; font-size: 14px; color: var(--ink); line-height: 1.45; border-left: 3px solid var(--accent); opacity: 0; transform: translateY(10px) scale(.98); transition: opacity .4s, transform .4s; box-shadow: 0 1px 2px rgba(0,0,0,.04); }\n.rqa .bubble.on { opacity: 1; transform: none; edia (max-width: 700px) {\n  .rqa .act { padding: 32px; }\n  .rqa .grid-dots { grid-template-columns: repeat(16, 1fr); }\n}\n\n</style>\n</head>\n<body>\n\n<section class=\"hero hero--short\">\n  <div class=\"container\">\n    <p class=\"breadcrumb\" data-anim=\"fade-up\">RecallQ / PhysioIQ</p>\n    <p class=\"eyebrow\" data-anim=\"fade-up\" style=\"color:#7A6A5C;\">RECALLQ FOR PHYSIOTHERAPY CLINICS</p>\n    <h1 data-anim=\"fade-up\">35% of your physio patients drop off before finishing their plan. PhysioIQ brings them back.</h1>\n    <p class=\"lead center\" data-anim=\"fade-up\">Patients who stop mid-treatment don't just cost you revenue — they don't get better. PhysioIQ sends personalised reminders referencing their condition, last session, and goals.</p>\n    <div class=\"ctas\" data-anim=\"fade-up\"><button class=\"btn btn--primary btn--lg\" data-start-now data-vertical=\"Physio\">Start now</button></div>\n    <p class=\"trust-strip\" data-anim=\"fade-up\"><span>Built for physio</span><span class=\"sep\">·</span><span>AU data residency</span><span class=\"sep\">·</span><span>Live in 20 minutes</span></p>\n  </div>\n</section>\n\n<section class=\"section section--white\">\n  <div class=\"container\">\n    <h2 class=\"text-center\" data-anim=\"fade-up\" style=\"margin-bottom:40px;\">Why physio clinics lose patients.</h2>\n    <div class=\"grid-3\" data-stagger>\n      <div class=\"card\"><div class=\"ic\"><svg viewBox=\"0 0 24 24\"><path d=\"M12 2v4M12 18v4M4.9 4.9l2.8 2.8M16.3 16.3l2.8 2.8M2 12h4M18 12h4M4.9 19.1l2.8-2.8M16.3 7.7l2.8-2.8\"/></svg></div><h3>Patients feel 60% better and assume they're done.</h3><p style=\"color:var(--text-muted);font-size:14px;\">The injury isn't. Abandoned plans mean re-injury, chronic pain, and lost outcomes.</p></div>\n      <div class=\"card\"><div class=\"ic\"><svg viewBox=\"0 0 24 24\"><path d=\"M22 16.9c0 1.2-1 2.1-2.1 2.1A18 18 0 0 1 3 5.1C3 4 4 3 5.1 3h3a1.8 1.8 0 0 1 1.8 1.4l1 3a1.8 1.8 0 0 1-.4 1.9l-1.3 1.2a16 16 0 0 0 6 6l1.2-1.3a1.8 1.8 0 0 1 1.9-.4l3 1a1.8 1.8 0 0 1 1.4 1.8Z\"/></svg></div><h3>Reception can't chase mid-plan dropoffs.</h3><p style=\"color:var(--text-muted);font-size:14px;\">They're too busy with incoming referrals, HICAPS claims, and new bookings.</p></div>\n      <div class=\"card\"><div class=\"ic\"><svg viewBox=\"0 0 24 24\"><path d=\"M3 3v18h18M7 14l4-4 4 4 5-5\"/></svg></div><h3>At $90–150 per session, 10 recovered patients a month is $1,200+.</h3><p style=\"color:var(--text-muted);font-size:14px;\">Compounded across a year, that's a full practitioner's book.</p></div>\n    </div>\n  </div>\n</section>\n\n<section class=\"section\">\n  <div class=\"container\">\n    <h2 class=\"text-center\" data-anim=\"fade-up\" style=\"margin-bottom:32px;\">Built for physio workflow.</h2>\n    <ul class=\"bullets\" style=\"max-width:560px;margin:0 auto;\">\n      <li>Works with Cliniko, Nookal, Power Diary, Halaxy (CSV export)</li>\n      <li>Recall logic tuned per presentation: acute, chronic, post-op, NDIS</li>\n      <li>Messages reference body areas, treatment phases, milestones</li>\n      <li>Respects HICAPS, Medicare, and private health rebate cycles</li>\n    </ul>\n  </div>\n</section>\n\n<section class=\"section section--dark\">\n  <div class=\"container text-center\">\n    <p data-anim=\"fade-up\" style=\"max-width:620px;margin:0 auto 24px;font-size:18px;line-height:1.6;\">An 800-patient physio clinic. 280 patients overdue. Recovery rate yields 17 bookings/month × $120 = <strong style=\"color:var(--periwinkle);\">$2,040/month recovered</strong>. PhysioIQ Growth plan: $ 1,799/month. Net: <strong style=\"color:var(--periwinkle);\">$241/month</strong>.</p>\n    <button class=\"btn btn--primary btn--lg\" data-start-now data-vertical=\"Physio\">Start now — run this on my numbers</button>\n  </div>\n</section>\n\n<section class=\"section section--white\">\n  <div class=\"container\">\n    <h2 class=\"text-center\" data-anim=\"fade-up\" style=\"margin-bottom:32px;\">Physio FAQ</h2>\n    <div class=\"faq\">\n      <details class=\"faq-item\" open><summary>Does it integrate with Cliniko / Nookal / Power Diary?</summary><p class=\"a\">Yes — CSV export from any of them works out of the box.</p></details>\n      <details class=\"faq-item\"><summary>How does it handle NDIS and workers-comp patients?</summary><p class=\"a\">Cohort flags keep NDIS/WorkCover patients separate with different message tone and frequency.</p></details>\n      <details class=\"faq-item\"><summary>Can it reference specific body areas or conditions?</summary><p class=\"a\">Yes — injury region, phase, and goals are all usable variables.</p></details>\n      <details class=\"faq-item\"><summary>What about patients on Medicare CDM plans?</summary><p class=\"a\">We respect the 5-session limit and prompt plan review at the right time.</p></details>\n      <details class=\"faq-item\"><summary>Can I pause reminders for patients in active recovery?</summary><p class=\"a\">Yes, per-patient pause is one click from the dashboard.</p></details>\n      <details class=\"faq-item\"><summary>How fast can I go live?</summary><p class=\"a\">Under 20 minutes from CSV upload.</p></details>\n    </div>\n  </div>\n</section>\n\n<section class=\"cta-band\">\n  <div class=\"container\" data-stagger>\n    <h2>Ready to see PhysioIQ on your patient data?</h2>\n    <p>15 minutes. Your real numbers. No credit card.</p>\n    <div><button class=\"btn btn--primary btn--lg\" data-start-now data-vertical=\"Physio\">Start now</button></div>\n  </div>\n</section>\n\n<script>\n/* RecallQ — animation helpers (vanilla, framer-motion-free) */\n(function () {\n  'use strict';\n  const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n  const io = new IntersectionObserver((entries) => {\n    entries.forEach(e => {\n      if (e.isIntersecting) {\n        const el = e.target;\n        // Force reflow so the transition starts from the pre-class initial state,\n        // avoiding a stuck \"pending\" transition in backgrounded/iframed load.\n        // eslint-disable-next-line no-unused-expressions\n        el.offsetHeight;\n        el.classList.add('in');\n        // per-child delays for staggered containers\n        if (el.hasAttribute('data-stagger')) {\n          const kids = el.children;\n          for (let i = 0; i < kids.length; i++) {\n            kids[i].style.transitionDelay = prefersReduced ? '0s' : (0.1 + i * 0.12) + 's';\n          }\n        }\n        // Fallback: finish stalled transitions after 900ms so opacity never sticks at 0.\n        setTimeout(() => {\n          const targets = el.hasAttribute('data-stagger') ? [el, ...el.children] : [el];\n          targets.forEach(t => {\n            if (t.getAnimations) {\n              t.getAnimations().forEach(a => {\n                if (a.playState === 'running' && a.startTime == null) { try { a.finish(); } catch(err){} }\n              });\n            }\n          });\n        }, 900);\n        io.unobserve(el);\n      }\n    });\n  }, { rootMargin: '-80px', threshold: 0.01 });\n\n  function register(root = document) {\n    root.querySelectorAll('[data-anim], [data-stagger]').forEach(el => {\n      if (el.dataset.animOn) return;\n      el.dataset.animOn = '1';\n      io.observe(el);\n    });\n  }\n\n  // Stagger on mount (hero): add 'hero-in' class which matches same rules\n  function mountStagger(root) {\n    const els = root.querySelectorAll('[data-mount]');\n    els.forEach((el, i) => {\n      el.style.transitionDelay = prefersReduced ? '0s' : (i * 0.1) + 's';\n      requestAnimationFrame(() => el.classList.add('in'));\n    });\n    // Safety: finish any stuck transitions (happens in backgrounded/iframed loads)\n    setTimeout(() => {\n      els.forEach(el => {\n        if (el.getAnimations) {\n          el.getAnimations().forEach(a => {\n            if (a.playState === 'running' && (a.currentTime === 0 || a.startTime == null)) {\n              try { a.finish(); } catch (err) {}\n            }\n          });\n        }\n      });\n    }, 1200);\n  }\n\n  function countUp(el, target, duration = 1800, prefix = '', suffix = '') {\n    if (prefersReduced) {\n      el.textContent = prefix + Math.round(target).toLocaleString() + suffix;\n      return;\n    }\n    const start = performance.now();\n    function frame(now) {\n      const t = Math.min((now - start) / duration, 1);\n      const eased = 1 - Math.pow(1 - t, 3);\n      const val = Math.round(target * eased);\n      el.textContent = prefix + val.toLocaleString() + suffix;\n      if (t < 1) requestAnimationFrame(frame);\n    }\n    requestAnimationFrame(frame);\n  }\n\n  function observeCount(el, target, opts = {}) {\n    const obs = new IntersectionObserver((entries) => {\n      entries.forEach(e => {\n        if (e.isIntersecting) {\n          countUp(el, target, opts.duration, opts.prefix, opts.suffix);\n          obs.unobserve(el);\n        }\n      });\n    }, { rootMargin: '-40px' });\n    obs.observe(el);\n  }\n\n  window.RQA = { register, mountStagger, countUp, observeCount, prefersReduced };\n\n  function init() {\n    register();\n    document.querySelectorAll('[data-mount-stagger]').forEach(c => mountStagger(c));\n    // Safety net: if for any reason transitions don't fire (background tab,\n    // bundled blob-script timing, etc.), force-reveal everything after 1.5s\n    // by disabling transitions and applying the end state directly.\n    setTimeout(() => {\n      document.querySelectorAll('[data-mount], [data-anim], [data-stagger]').forEach(el => {\n        const op = parseFloat(getComputedStyle(el).opacity);\n        if (op < 0.99) {\n          el.style.transition = 'none';\n          el.style.opacity = '1';\n          el.style.transform = 'none';\n          el.classList.add('in');\n        }\n      });\n    }, 1500);\n  }\n  if (document.readyState === 'loading') {\n    document.addEventListener('DOMContentLoaded', init);\n  } else {\n    init();\n  }\n  // Belt-and-braces: also run on window load in case DOMContentLoaded fired before this script.\n  window.addEventListener('load', () => {\n    if (!document.querySelector('[data-mount].in')) init();\n  });\n})();\n\n<\/script>\n<script data-active=\"physio\" data-vertical=\"Physio\">\n/* RecallQ — header, footer, Start Now modal\n   Usage: <script src=\"assets/partials.js\"\n          data-active=\"home|dentistry|physio|optometry|how|pricing|about|legal\"\n          data-vertical=\"Dentistry|Physio|Optometry\" (optional modal preset)\n          data-depth=\"0|1\"><\\/script>\n*/\n(function () {\n  const me = document.currentScript;\n  const active = me?.dataset.active || '';\n  const vPreset = me?.dataset.vertical || '';\n  const depth = (parseInt(me?.dataset.depth || '0', 10)) || 0;\n  const up = '../'.repeat(depth);\n  const ver = '?v=g1';\n\n  // HEADER\n  const hdr = document.createElement('div');\n  hdr.innerHTML = `\n    <header class=\"site-header\" id=\"siteHeader\">\n      <div class=\"container hdr-inner\">\n        <a class=\"wordmark\" href=\"${up}index.html\" aria-label=\"RecallQ home\">Recall<span class=\"q\">Q</span></a>\n        <nav class=\"nav\" aria-label=\"Primary\">\n          <div class=\"nav-dd\">\n            <button aria-haspopup=\"true\" aria-expanded=\"false\">Solutions</button>\n            <div class=\"nav-dd-menu\" role=\"menu\">\n              <a href=\"${up}dentistry.html\"><span class=\"dot\" style=\"background:#5C5A54\"></span><span><strong>DentistryIQ</strong><span class=\"sub-desc\">Recall for dental practices</span></span></a>\n              <a href=\"${up}physio.html\"><span class=\"dot\" style=\"background:#7A6A5C\"></span><span><strong>PhysioIQ</strong><span class=\"sub-desc\">Recall for physiotherapy</span></span></a>\n              <a href=\"${up}optometry.html\"><span class=\"dot\" style=\"background:#5A6470\"></span><span><strong>OptometryIQ</strong><span class=\"sub-desc\">Recall for optometry</span></span></a>\n            </div>\n          </div>\n          <a href=\"${up}how-it-works.html\">How it works</a>\n          <a href=\"${up}pricing.html\">Pricing</a>\n          <a href=\"${up}about.html\">About</a>\n        </nav>\n        <button class=\"btn btn--primary\" data-start-now>Start now</button>\n        <button class=\"hamb\" aria-label=\"Menu\" id=\"hambBtn\"><span></span></button>\n      </div>\n      <div class=\"mobile-menu\" id=\"mobileMenu\">\n        <ul>\n          <li><a href=\"${up}dentistry.html\"><span class=\"dot\" style=\"background:#5C5A54;margin-right:8px;display:inline-block;\"></span>DentistryIQ</a></li>\n          <li><a href=\"${up}physio.html\"><span class=\"dot\" style=\"background:#7A6A5C;margin-right:8px;display:inline-block;\"></span>PhysioIQ</a></li>\n          <li><a href=\"${up}optometry.html\"><span class=\"dot\" style=\"background:#5A6470;margin-right:8px;display:inline-block;\"></span>OptometryIQ</a></li>\n          <li><a href=\"${up}how-it-works.html\">How it works</a></li>\n          <li><a href=\"${up}pricing.html\">Pricing</a></li>\n          <li><a href=\"${up}about.html\">About</a></li>\n          <li><button data-start-now style=\"color:var(--periwinkle-dark);font-weight:500;\">Start now →</button></li>\n        </ul>\n      </div>\n    </header>\n  `;\n  document.body.insertBefore(hdr.firstElementChild, document.body.firstChild);\n  // Double-rAF + forced reflow to guarantee the transition starts from the initial state.\n  // Without this, iframes that are backgrounded on load can stall the transition in\n  // \"pending\" state (playState:running, startTime:null) and opacity stays at 0 forever.\n  const hdrEl = document.getElementById('siteHeader');\n  requestAnimationFrame(() => requestAnimationFrame(() => {\n    // Force reflow\n    // eslint-disable-next-line no-unused-expressions\n    hdrEl.offsetHeight;\n    hdrEl.classList.add('ready');\n    // Fallback: if transitions stalled (bg'd tab at load), finish them after 800ms.\n    setTimeout(() => {\n      if (getComputedStyle(hdrEl).opacity !== '1') {\n        hdrEl.getAnimations && hdrEl.getAnimations().forEach(a => { try { a.finish(); } catch(e){} });\n      }\n    }, 800);\n  }));\n\n  document.getElementById('hambBtn')?.addEventListener('click', () => {\n    document.getElementById('mobileMenu').classList.toggle('open');\n  });\n\n  // FOOTER\n  const footer = document.createElement('footer');\n  footer.className = 'footer';\n  footer.innerHTML = `\n    <div class=\"container\" data-anim=\"fade-up\">\n      <div class=\"grid\" data-stagger>\n        <div class=\"brand-col\">\n          <div class=\"wordmark\">Recall<span class=\"q\">Q</span></div>\n          <p class=\"tag\">AI-powered patient recall. Built in Australia.</p>\n        </div>\n        <div>\n          <h4>Solutions</h4>\n          <ul>\n            <li><a href=\"${up}dentistry.html\">DentistryIQ</a></li>\n            <li><a href=\"${up}physio.html\">PhysioIQ</a></li>\n            <li><a href=\"${up}optometry.html\">OptometryIQ</a></li>\n          </ul>\n        </div>\n        <div>\n          <h4>Product</h4>\n          <ul>\n            <li><a href=\"${up}how-it-works.html\">How it works</a></li>\n            <li><a href=\"${up}pricing.html\">Pricing</a></li>\n            <li><button data-start-now>Start now</button></li>\n          </ul>\n        </div>\n        <div>\n          <h4>Company &amp; Legal</h4>\n          <ul>\n            <li><a href=\"${up}about.html\">About</a></li>\n            <li><a href=\"mailto:\">Contact</a></li>\n            <li><a href=\"${up}legal/privacy.html\">Privacy Policy</a></li>\n            <li><a href=\"${up}legal/terms.html\">Terms</a></li>\n            <li><a href=\"${up}legal/dpa.html\">DPA</a></li>\n          </ul>\n        </div>\n      </div>\n      <div class=\"compliance\">\n        <span>Australian-owned</span><span class=\"sep\">·</span>\n        <span>AU data residency</span><span class=\"sep\">·</span>\n        <span>Privacy Act 1988</span><span class=\"sep\">·</span>\n        <span>Spam Act 2003</span>\n      </div>\n      <div class=\"copy\">© RecallQ Pty Ltd · recallq.com.au · Made in Australia</div>\n    </div>\n  `;\n  document.body.appendChild(footer);\n\n  // MODAL\n  const modal = document.createElement('div');\n  modal.className = 'modal-backdrop';\n  modal.id = 'startNowModal';\n  modal.innerHTML = `\n    <div class=\"modal\" role=\"dialog\" aria-labelledby=\"snmTitle\" aria-modal=\"true\">\n      <button class=\"close\" aria-label=\"Close\" data-close>✕</button>\n      <div id=\"snmForm\">\n        <h2 id=\"snmTitle\">Start with RecallQ</h2>\n        <p class=\"sub\">Tell us about your practice. We'll run the numbers and get back to you within 24 hours.</p>\n        <form id=\"snmFormEl\" novalidate>\n          <div><label>Your name</label><input name=\"name\" required placeholder=\"First and last name\" autocomplete=\"name\"></div>\n          <div><label>Work email</label><input name=\"email\" type=\"email\" required placeholder=\"you@yourpractice.com.au\" autocomplete=\"email\"></div>\n          <div><label>Mobile</label><input name=\"mobile\" type=\"tel\" placeholder=\"+61 4XX XXX XXX\" autocomplete=\"tel\"></div>\n          <div><label>Practice name</label><input name=\"practice\" required placeholder=\"Your practice name\"></div>\n          <div>\n            <label>Your vertical</label>\n            <div class=\"vpicker\" role=\"group\" aria-label=\"Vertical\">\n              <button type=\"button\" data-v=\"Dentistry\">Dentistry</button>\n              <button type=\"button\" data-v=\"Physio\">Physio</button>\n              <button type=\"button\" data-v=\"Optometry\">Optometry</button>\n            </div>\n            <input type=\"hidden\" name=\"vertical\" id=\"snmVertical\" value=\"\">\n          </div>\n          <div><label>Active patients</label><select name=\"patients\"><option>Under 500</option><option>500–1,500</option><option>1,500–3,000</option><option>3,000+</option></select></div>\n          <div><label>Biggest recall problem (optional)</label><textarea name=\"problem\" rows=\"2\" placeholder=\"e.g. Hundreds of patients are overdue but we can't reach them all.\"></textarea></div>\n          <button type=\"submit\" class=\"btn btn--primary btn--full btn--lg\">Start now →</button>\n          <p class=\"privacy-note\">By submitting you agree to our <a href=\"${up}legal/privacy.html\">Privacy Policy</a>. No spam, ever.</p>\n        </form>\n      </div>\n      <div id=\"snmSuccess\" class=\"success\" style=\"display:none;\">\n        <div class=\"icon\"><svg viewBox=\"0 0 24 24\"><path d=\"M5 12.5 l4 4 L19 7\"/></svg></div>\n        <h3 id=\"snmThanks\">Thanks. We've got it.</h3>\n        <p>One of the founders will email you within 24 hours with a link to book a 15-minute call.</p>\n        <a href=\"${up}how-it-works.html\" class=\"btn btn--link\">See how RecallQ works →</a>\n      </div>\n    </div>\n  `;\n  document.body.appendChild(modal);\n\n  const backdrop = modal;\n  const verticalHidden = modal.querySelector('#snmVertical');\n\n  function openModal(preset) {\n    backdrop.classList.add('open');\n    document.body.style.overflow = 'hidden';\n    const preselect = preset || vPreset;\n    if (preselect) selectVertical(preselect);\n    setTimeout(() => modal.querySelector('input[name=\"name\"]')?.focus(), 300);\n  }\n  function closeModal() {\n    backdrop.classList.remove('open');\n    document.body.style.overflow = '';\n  }\n  function selectVertical(v) {\n    verticalHidden.value = v;\n    modal.querySelectorAll('.vpicker button').forEach(b => b.classList.toggle('on', b.dataset.v === v));\n  }\n\n  modal.querySelectorAll('.vpicker button').forEach(b => b.addEventListener('click', () => selectVertical(b.dataset.v)));\n  modal.querySelector('[data-close]').addEventListener('click', closeModal);\n  backdrop.addEventListener('click', (e) => { if (e.target === backdrop) closeModal(); });\n  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });\n\n  modal.querySelector('#snmFormEl').addEventListener('submit', (e) => {\n    e.preventDefault();\n    const data = Object.fromEntries(new FormData(e.target));\n    const first = (data.name || '').split(' ')[0] || '';\n    document.getElementById('snmForm').style.display = 'none';\n    const success = document.getElementById('snmSuccess');\n    success.style.display = 'block';\n    document.getElementById('snmThanks').textContent = `Thanks${first ? ', ' + first : ''}. We've got it.`;\n  });\n\n  // Bind all Start now triggers\n  document.addEventListener('click', (e) => {\n    const t = e.target.closest('[data-start-now]');\n    if (!t) return;\n    e.preventDefault();\n    openModal(t.dataset.vertical);\n  });\n\n  window.RQModal = { open: openModal, close: closeModal, selectVertical };\n\n  /* LivingBackground removed — Apple-style restraint */\n})();\n\n<\/script>\n<script>\n/* RecallQ — live/automated UX layer\n   - Floating activity toasts (bottom-left) mimicking real booking recoveries\n   - Live counter ticking up (\"$X recovered across RecallQ practices this month\")\n   - CTA pulse beacon\n   - Animated number countup on ROI outputs (hooks into existing ROI calc)\n*/\n(function () {\n  'use strict';\n  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n  /* ============================================================\n     LIVE ACTIVITY TOASTS\n     ============================================================ */\n  const POOL = [\n    { v: 'Dentistry',  c: '#5C5A54', city: 'Sydney',    amt: 200, who: 'Rosehill Dental',  msg: 'clean booked' },\n    { v: 'Optometry',  c: '#5A6470', city: 'Melbourne', amt: 340, who: 'Parkside Eyecare', msg: 'eye exam booked' },\n    { v: 'Physio',     c: '#7A6A5C', city: 'Brisbane',  amt: 120, who: 'Northside Physio', msg: 'session booked' },\n    { v: 'Dentistry',  c: '#5C5A54', city: 'Perth',     amt: 180, who: 'Leederville Smile',msg: 'check-up booked' },\n    { v: 'Optometry',  c: '#5A6470', city: 'Adelaide',  amt: 390, who: 'Glenelg Optical',  msg: 'frames + exam booked' },\n    { v: 'Physio',     c: '#7A6A5C', city: 'Newcastle', amt: 150, who: 'Hunter Sports Physio', msg: 'review booked' },\n    { v: 'Dentistry',  c: '#5C5A54', city: 'Gold Coast',amt: 220, who: 'Broadbeach Dental',msg: 'hygiene recall' },\n    { v: 'Optometry',  c: '#5A6470', city: 'Canberra',  amt: 280, who: 'Braddon Optometry',msg: '2-year recall' },\n    { v: 'Physio',     c: '#7A6A5C', city: 'Hobart',    amt: 110, who: 'Salamanca Physio', msg: 'mid-plan return' },\n    { v: 'Dentistry',  c: '#5C5A54', city: 'Geelong',   amt: 240, who: 'Waterfront Dental',msg: 'perio booked' }\n  ];\n\n  const NAMES = ['Sarah M.', 'James L.', 'Priya K.', 'Tom W.', 'Aisha R.', 'Oliver B.', 'Lily N.', 'Marcus T.', 'Chen W.', 'Emma S.', 'Jake P.', 'Nora D.'];\n  function pickName(i) { return NAMES[i % NAMES.length]; }\n\n  function buildToastContainer() {\n    if (document.getElementById('rqa-toasts')) return document.getElementById('rqa-toasts');\n    const host = document.createElement('div');\n    host.id = 'rqa-toasts';\n    host.setAttribute('aria-live', 'polite');\n    host.style.cssText = [\n      'position:fixed',\n      'left:20px',\n      'bottom:20px',\n      'z-index:60',\n      'display:flex',\n      'flex-direction:column',\n      'gap:10px',\n      'pointer-events:none',\n      'max-width:300px'\n    ].join(';');\n    document.body.appendChild(host);\n    return host;\n  }\n\n  function showToast(data, idx) {\n    const host = buildToastContainer();\n    const el = document.createElement('div');\n    el.className = 'rqa-toast';\n    el.style.cssText = [\n      'background:#fff',\n      'border:.5px solid #D5DAE4',\n      'border-left:3px solid ' + data.c,\n      'border-radius:10px',\n      'padding:12px 14px',\n      'box-shadow:0 6px 24px rgba(42,40,35,.10)',\n      'font-family:Inter,-apple-system,sans-serif',\n      'font-size:13px',\n      'color:#2A2823',\n      'line-height:1.4',\n      'pointer-events:auto',\n      'opacity:0',\n      'transform:translateX(-24px) scale(.96)',\n      'transition:opacity .45s cubic-bezier(.22,1,.36,1),transform .45s cubic-bezier(.22,1,.36,1)'\n    ].join(';');\n    el.innerHTML =\n      '<div style=\"display:flex;align-items:flex-start;gap:10px;\">' +\n        '<div style=\"width:8px;height:8px;border-radius:50%;background:' + data.c + ';flex-shrink:0;margin-top:5px;animation:rqaPulse 1.4s ease-out infinite;\"></div>' +\n        '<div style=\"flex:1;min-width:0;\">' +\n          '<div style=\"font-weight:500;color:#2A2823;\">' + pickName(idx) + ' · ' + data.city + '</div>' +\n          '<div style=\"color:#7A7870;font-size:12px;margin-top:2px;\">' + data.msg + ' · <span style=\"color:#5876C4;font-weight:500;\">+$' + data.amt + '</span></div>' +\n          '<div style=\"color:#7A7870;font-size:11px;margin-top:4px;opacity:.7;\">via ' + data.v + 'IQ · just now</div>' +\n        '</div>' +\n        '<button aria-label=\"Dismiss\" style=\"background:none;border:0;color:#7A7870;cursor:pointer;font-size:16px;line-height:1;padding:0 2px;\">×</button>' +\n      '</div>';\n    host.appendChild(el);\n\n    requestAnimationFrame(() => {\n      el.style.opacity = '1';\n      el.style.transform = 'none';\n    });\n\n    el.querySelector('button').addEventListener('click', () => removeToast(el));\n\n    setTimeout(() => removeToast(el), 5200);\n  }\n\n  function removeToast(el) {\n    if (!el || !el.parentNode) return;\n    el.style.opacity = '0';\n    el.style.transform = 'translateX(-24px) scale(.96)';\n    setTimeout(() => el.remove(), 500);\n  }\n\n  function startToastStream() {\n    if (reduced) return;\n    let i = 0;\n    function next() {\n      const data = POOL[Math.floor(Math.random() * POOL.length)];\n      showToast(data, i++);\n      // irregular cadence: 6–11s\n      const wait = 6000 + Math.random() * 5000;\n      setTimeout(next, wait);\n    }\n    // \n    s.id = 'rqa-live-kf';\n    s.textContent = [\n      '@keyframes rqaPulse { 0%{box-shadow:0 0 0 0 rgba(88,118,196,.55);} 70%{box-shadow:0 0 0 8px rgba(88,118,196,0);} 100%{box-shadow:0 0 0 0 rgba(88,118,196,0);} }',\n      '@keyframes rqaBeacon { 0%{box-shadow:0 0 0 0 rgba(88,118,196,.4);} 70%{box-shadow:0 0 0 14px rgba(88,118,196,0);} 100%{box-shadow:0 0 0 0 rgba(88,118,196,0);} }',\n      '@keyframes rqaFloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-4px);} }',\n      '@keyframes rqaTickerSlide { 0%{transform:translateX(0);} 100%{transform:translateX(-50%);} }',\n      '.btn--primary.btn--lg[data-pulse] { animation: rqaBeacon 2.4s ease-out infinite; }',\n      '.btn--primary.btn--lg[data-pulse]:hover { animation: none; }',\n      '@media (prefers-reduced-motion: reduce) { .btn--primary.btn--lg[data-pulse], .rqa-toast .rqa-toast-dot { animation: none !important; } }',\n      '@media (max-width: 640px) { #rqa-toasts { left: 12px; right: 12px; bottom: 12px; max-width: none; } }'\n    ].join('\\n');\n    document.head.appendChild(s);\n  }\n\n  /* ============================================================\n     Hook: enhance ROI calc numbers with tick effect on change\n     ============================================================ */\n  function enhanceROI() {\n    const ids = ['roiOverdue', 'roiMonth', 'roiYear'];\n    ids.forEach(id => {\n      const el = document.getElementById(id);\n      if (!el) return;\n      const obs = new MutationObserver(() => {\n        el.style.transition = 'color .25s';\n        el.style.color = '#8AA8E8';\n        clearTimeout(el._rqaT);\n        el._rqaT = setTimeout(() => { el.style.color = ''; }, 240);\n      });\n      obs.observe(el, { childList: true, characterData: true, subtree: true });\n    });\n  }\n\n  /* ============================================================\n     BOOT\n     ============================================================ */\n  function boot() {\n    injectKeyframes();\n    addCTAPulse();\n    liveCounter();\n    enhanceROI();\n    startToastStream();\n  }\n\n  if (document.readyState === 'loading') {\n    document.addEventListener('DOMContentLoaded', boot);\n  } else {\n    boot();\n  }\n})();\n\n<\/script>\n<script>\n/* RecallQ — automations layer\n   - ScrollProgressBar\n   - CursorTrail (desktop)\n   - MagneticButton (on .btn--primary.btn--lg)\n   - TypewriterHeadline ([data-typewriter] w/ <span data-hl>…</span>)\n   - ParticleHero ([data-particle-hero])\n   - OdometerNumber ([data-odometer] w/ target number)\n   - ExitIntentModal (once per session)\n   - StickyROIBar (after ROI calc, reads #roiMonth)\n   - VerticalAutoDetect (UTM/referrer → pulse home card + preset modal)\n*/\n(function(){\n  'use strict';\n  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;\n  const isDesktop = matchMedia('(pointer: fine)').matches && matchMedia('(min-width: 820px)').matches;\n\n  /* ---------- CSS injection ---------- */\n  function css(){\n    if(document.getElementById('rqa-autom-css')) return;\n    const s=document.createElement('style'); s.id='rqa-autom-css';\n    s.textContent=`\n    #rqa-sp{position:fixed;top:0;left:0;height:2px;background:#5876C4;width:0;z-index:100;transition:width .08s linear;}\n    #rqa-ct-layer{position:fixed;inset:0;pointer-events:none;z-index:9999;}\n    .rqa-ct-dot{position:absolute;width:6px;height:6px;border-radius:50%;background:#8AA8E8;transform:translate(-50%,-50%);transition:opacity .25s linear,transform .25s linear;}\n    [data-magnetic]{transition:transform .25s cubic-bezier(.22,1,.36,1);will-change:transform;}\n    [data-particle-hero]{position:relative;}\n    [data-particle-hero] > .rqa-ph-canvas{position:absolute;inset:0;z-index:0;pointer-events:none;}\n    [data-particle-hero] > .container{position:relative;z-index:1;}\n    .rqa-tw-cursor{display:inline-block;width:2px;height:.9em;background:#2A2823;margin-left:2px;vertical-align:baseline;animation:rqaTW 1s step-start infinite;}\n    @keyframes rqaTW{50%{opacity:0;}}\n    .rqa-sticky-roi{position:fixed;left:0;right:0;bottom:0;background:#2A2823;color:#FAF7F2;padding:12px 20px;z-index:70;display:flex;align-items:center;justify-content:center;gap:18px;font-size:14px;transform:translateY(100%);transition:transform .4s cubic-bezier(.22,1,.36,1);box-shadow:0 -4px 20px rgba(0,0,0,.2);}\n    .rqa-sticky-roi.in{transform:none;}\n    .rqa-sticky-roi strong{color:#8AA8E8;font-weight:500;}\n    .rqa-sticky-roi a{color:#8AA8E8;text-decoration:none;font-weight:500;}\n    .rqa-sticky-roi button.rqa-dismiss{background:none;border:0;color:#7A7870;cursor:pointer;font-size:18px;margin-left:8px;}\n    .rqa-vd-pulse{animation:rqaVDPulse 1.6s cubic-bezier(.22,1,.36,1) 1;}\n    @keyframes rqaVDPulse{0%{box-shadow:0 0 0 0 rgba(88,118,196,0);transform:scale(1);}40%{box-shadow:0 0 0 14px rgba(88,118,196,.18);transform:scale(1.03);}100%{box-shadow:0 0 0 0 rgba(88,118,196,0);transform:scale(1);}}\n    @media (prefers-reduced-motion: reduce){#rqa-ct-layer{display:none;}.rqa-tw-cursor{animation:none;}}\n    @media (max-width:820px){.rqa-sticky-roi{font-size:13px;padding:10px 14px;gap:10px;flex-wrap:wrap;}#rqa-ct-layer{display:none;}}\n    `;\n    document.head.appendChild(s);\n  }\n\n  /* ---------- ScrollProgressBar ---------- */\n  function scrollBar(){\n    const b=document.createElement('div'); b.id='rqa-sp'; document.body.appendChild(b);\n    function upd(){\n      const h=document.documentElement.scrollHeight-innerHeight;\n      b.style.width=h>0?(scrollY/h*100)+'%':'0';\n    }\n    addEventListener('scroll',upd,{passive:true}); upd();\n  }\n\n  /* ---------- CursorTrail ---------- */\n  function cursorTrail(){\n    if(!isDesktop||reduced) return;\n    const layer=document.createElement('div'); layer.id='rqa-ct-layer'; document.body.appendChild(layer);\n    const N=5; const dots=[];\n    for(let i=0;i<N;i++){const d=document.createElement('div'); d.className='rqa-ct-dot'; d.style.opacity=(0.6*(1-i/N)).toFixed(2); lay cur.style.opacity='0';},1200); return; }\n      const seg=segments[si];\n      if(ci>=seg.t.length){ si++; ci=0; setTimeout(step,0); return; }\n      const ch=document.createTextNode(seg.t[ci]);\n      if(seg.hl){ const w=document.createElement('span'); w.style.color='#5876C4'; w.appendChild(ch); el.insertBefore(w,cur); }\n      else { el.insertBefore(ch,cur); }\n      ci++;\n      setTimeout(step,38);\n    }\n    setTimeout(step,350);\n  }\n\n  /* ---------- ParticleHero ---------- */\n  function particles(){\n    if(reduced) return;\n    const host=document.querySelector('[data-particle-hero]'); if(!host) return;\n    const c=document.createElement('canvas'); c.className='rqa-ph-canvas'; host.appendChild(c);\n    const ctx=c.getContext('2d');\n    let w=0,h=0,P=[];\n    function resize(){ w=c.width=host.offsetWidth; h=c.height=host.offsetHeight; }\n    function init(){\n      P=[];\n      for(let i=0;i<40;i++) P.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-0.5)*0.6,vy:(Math.random()-0.5)*0.6});\n    }\n    resize(); init(); addEventListener('resize',()=>{resize();init();});\n    function tick(){\n      ctx.clearRect(0,0,w,h);\n      ctx.fillStyle='rgba(138,168,232,0.18)';\n      P.forEach(p=>{\n        p.x+=p.vx; p.y+=p.vy;\n        if(p.x<0||p.x>w) p.vx*=-1;\n        if(p.y<0||p.y>h) p.vy*=-1;\n        ctx.beginPath(); ctx.arc(p.x,p.y,2,0,Math.PI*2); ctx.fill();\n      });\n      requestAnimationFrame(tick);\n    }\n    tick();\n  }\n\n  /* ---------- OdometerNumber ---------- */\n  function odometer(){\n    document.querySelectorAll('[data-odometer]').forEach(el=>{\n      const target=parseFloat(el.dataset.odometer)||0;\n      const prefix=el.dataset.prefix||'';\n      const obs=new IntersectionObserver(es=>{\n        es.forEach(e=>{ if(e.isIntersecting){ run(); obs.unobserve(el); } });\n      },{rootMargin:'-40px'});\n      obs.observe(el);\n      function run(){\n        if(reduced){ el.textContent=prefix+Math.round(target).toLocaleString(); return; }\n        const start=performance.now(), dur=1400;\n        function frame(now){\n          const t=Math.min((now-start)/dur,1);\n          const eased=1-Math.pow(1-t,3);\n          el.textContent=prefix+Math.round(target*eased).toLocaleString();\n          if(t<1) requestAnimationFrame(frame);\n        }\n        requestAnimationFrame(frame);\n      }\n    });\n  }\n\n  /* ---------- ExitIntentModal ---------- */\n  function exitIntent(){\n    if(sessionStorage.getItem('rqa-exit')) return;\n    function onMove(e){\n      if(e.clientY<20){ trigger(); document.removeEventListener('mouseout',onMove); }\n    }\n    document.addEventListener('mouseout',onMove);\n    function trigger(){\n      sessionStorage.setItem('rqa-exit','1');\n      const btn=document.querySelector('[data-start-now]');\n      if(btn) btn.click();\n    }\n  }\n\n  /* ---------- StickyROIBar ---------- */\n  function stickyROI(){\n    const roi=document.getElementById('roiMonth'); if(!roi) return;\n    if(sessionStorage.getItem('rqa-sroi-dismissed')) return;\n    const bar=document.createElement('div'); bar.className='rqa-sticky-roi';\n    bar.innerHTML=`<span>Your estimated recovery:</span><strong id=\"rqa-sroi-amt\">$0</strong><span>/month</span><a href=\"#\" data-start-now>Start now →</a><button class=\"rqa-dismiss\" aria-label=\"Dismiss\">×</button>`;\n    document.body.appendChild(bar);\n    const amt=bar.querySelector('#rqa-sroi-amt');\n    function sync(){ amt.textContent=roi.textContent; }\n    new MutationObserver(sync).observe(roi,{childList:true,characterData:true,subtree:true});\n    sync();\n    bar.querySelector('.rqa-dismiss').addEventListener('click',()=>{\n      bar.classList.remove('in');\n      sessionStorage.setItem('rqa-sroi-dismissed','1');\n      setTimeout(()=>bar.remove(),400);\n    });\n    const roiSection=roi.closest('section');\n    const footerish=document.querySelector('.cta-band')||document.querySelector('footer');\n    let past=false,nearEnd=false;\n    const o1=new IntersectionObserver(es=>{ past=!es[0].isIntersecting && es[0].boundingClientRect.top<0; render(); },{threshold:0.1});\n    if(roiSection) o1.observe(roiSection);\n    const o2=new IntersectionObserver(es=>{ nearEnd=es[0].isIntersecting; render(); },{threshold:0.05});\n    if(footerish) o2.observe(footerish);\n    function render(){\n      if(past && !nearEnd) bar.classList.add('in');\n      else bar.classList.remove('in');\n    }\n  }\n\n  /* ---------- VerticalAutoDetect ---------- */\n  function verticalDetect(){\n    const q=new URLSearchParams(location.search);\n    let v=q.get('vertical')||'';\n    if(!v){\n      const ref=(document.referrer||'').toLowerCase();\n      if(/dent/.test(ref)) v='dentistry';\n      else if(/physio/.test(ref)) v='physio';\n      else if(/optom/.test(ref)) v='optometry';\n    }\n    if(!v) return;\n    v=v.toLowerCase();\n    sessionStorage.setItem('rqa-vertical',v);\n    // Pulse matching home card\n    const map={dentistry:'a[href$=\"dentistry.html\"]',physio:'a[href$=\"physio.html\"]',optometry:'a[href$=\"optometry.html\"]'};\n    const sel=map[v]; if(sel){\n      const link=document.querySelector(sel);\n      const card=link && link.closest('.vcard');\n      if(card) setTimeout(()=>card.classList.add('rqa-vd-pulse'),800);\n    }\n    // Hero eyebrow\n    const eye=document.querySelector('.hero .eyebrow');\n    if(eye) eye.textContent=`BUILT FOR ${v.toUpperCase()} PRACTICES`;\n  }\n\n  /* ---------- BOOT ---------- */\n  function boot(){\n    css();\n    scrollBar();\n    cursorTrail();\n    magnetic();\n    typewriter();\n    particles();\n    odometer();\n    stickyROI();\n    exitIntent();\n    verticalDetect();\n  }\n  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot);\n  else boot();\n})();\n\n<\/script>\n<script>\n(function(){try{window.parent.postMessage({__recallq_route:\"physio\"},'*');}catch(e){}\nconst F2R={\"index.html\":\"home\",\"dentistry.html\":\"dentistry\",\"physio.html\ x; width: 100%; padding: 40px;\n  max-height: 90vh; overflow-y: auto;\n  transform: scale(.96) translateY(16px); opacity: 0;\n  transition: transform .4s var(--ease), opacity .3s;\n  position: relative;\n}\n.modal-backdrop.open .modal { transform: none; opacity: 1; }\n.modal h2 { font-size: 28px; margin-bottom: 6px; letter-spacing: -0.03em; }\n.modal .sub { font-size: 15px; color: var(--ink-3); margin-bottom: 24px; }\n.modal .close {\n  position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; border-radius: 50%;\n  display: inline-flex; align-items: center; justify-content: center; color: var(--ink-3); background: var(--bg-soft);\n}\n.modal .close:hover { background: var(--border); color: var(--ink); }\n.modal form { display: flex; flex-direction: column; gap: 16px; }\n.modal label { font-size: 12px; color: var(--ink-3); font-weight: 500; display: block; margin-bottom: 6px; letter-spacing: -0.005em; }\n.modal input, .modal select, .modal textarea {\n  width: 100%; border: .5px solid var(--border); border-radius: 10px; padding: 12px 14px;\n  font: inherit; font-size: 15px; background: #fff; color: var(--ink); transition: border-color .2s, box-shadow .2s;\n  font-family: inherit;\n}\n.modal input:focus, .modal select:focus, .modal textarea:focus {\n  outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(88,118,196,.18);\n}\n.modal textarea { resize: vertical; min-height: 68px; }\n.modal .vpicker { display: flex; gap: 8px; }\n.modal .vpicker button {\n  flex: 1; padding: 11px 8px; border-radius: 10px; background: var(--bg-soft); color: var(--ink-3);\n  font-size: 13px; font-weight: 500; transition: background-color .2s, color .2s;\n}\n.modal .vpicker button.on { background: var(--ink); color: #fff; }\n.modal .privacy-note { font-size: 11px; color: var(--ink-4); text-align: center; margin-top: 4px; }\n.modal .success { text-align: center; padding: 12px 0; }\n.modal .success .icon { width: 56px; height: 56px; border-radius: 50%; background: var(--accent); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 20px; }\n.modal .success .icon svg { width: 28px; height: 28px; stroke: #fff; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }\n.modal .success h3 { font-size: 22px; margin-bottom: 8px; }\n.modal .success p { font-size: 15px; color: var(--ink-3); margin-bottom: 20px; }\n\n/* ======================================================\n   Legacy component classes kept for sub-pages that still use them\n   ====================================================== */\n.card {\n  background: var(--bg-soft);\n  border-radius: var(--r-lg);\n  padding: 28px;\n  transition: transform .3s var(--ease);\n}\n.card:hover { transform: translateY(-4px); }\n.card h3 { margin-bottom: 10px; }\n.card p { color: var(--ink-3); font-size: 15px; }\n\n.vcard { padding: 32px; border-radius: var(--r-lg); background: var(--bg-soft); }\n.vcard .accent-dot { width: 36px; height: 36px; border-radius: 50%; margin-bottom: 20px; display: block; }\n.vcard h3 { font-size: 26px; font-weight: 600; letter-spacing: -0.03em; }\n.vcard .tagline { color: var(--ink-3); font-size: 15px; margin: 4px 0 14px; }\n.vcard .body { color: var(--ink-3); font-size: 15px; line-height: 1.5; margin-bottom: 22px; }\n.vcard .stats { color: var(--ink-4); font-size: 13px; margin-bottom: 20px; padding-top: 16px; border-top: .5px solid var(--border); }\n.vcard .cta-link { font-size: 15px; font-weight: 500; color: var(--accent); display: inline-flex; gap: 6px; transition: gap .2s; }\n.vcard:hover .cta-link { gap: 12px; }\n\n.ic { width: 42px; height: 42px; border-radius: 50%; background: #fff; color: var(--ink-2); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 18px; border: .5px solid var(--border); }\n.ic svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }\n\n.grid-3 { display: grid; grid-te : background-color .2s, color .2s, border-color .2s; }\n.pill.on { background: var(--ink); color: #fff; border-color: var(--ink); }\n.slider-label { font-size: 14px; color: var(--ink-3); margin-bottom: 8px; }\n.slider-val { font-size: 32px; font-weight: 600; letter-spacing: -0.03em; color: var(--ink); font-variant-numeric: tabular-nums; margin-bottom: 16px; }\ninput[type=\"range\"] { width: 100%; accent-color: var(--accent); }\n.roi-out { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-top: 28px; }\n.roi-out .box { background: #fff; border-radius: 14px; padding: 20px; }\n.roi-out .n { font-size: 28px; font-weight: 600; color: var(--accent); font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }\n.roi-out .l { font-size: 11px; color: var(--ink-4); text-transform: uppercase; letter-spacing: .1em; margin-top: 6px; }\n\n/* FAQ */\n.faq { max-width: 720px; margin: 0 auto; }\n.faq-item { border-bottom: .5px solid var(--border); }\n.faq-item summary { list-style: none; cursor: pointer; padding: 22px 0; font-size: 17px; color: var(--ink); font-weight: 500; display: flex; justify-content: space-between; align-items: center; gap: 16px; letter-spacing: -0.015em; }\n.faq-item summary::-webkit-details-marker { display: none; }\n.faq-item summary::after { content: \"+\"; font-size: 24px; font-weight: 300; color: var(--ink-3); transition: transform .3s; }\n.faq-item[open] summary::after { transform: rotate(45deg); }\n.faq-item .a { padding: 0 0 22px; color: var(--ink-3); font-size: 15px; line-height: 1.6; }\n\n.illo-ph { aspect-ratio: 4/3; border-radius: var(--r-lg); background: var(--bg-soft); display: flex; align-items: center; justify-content: center; color: var(--ink-4); font-family: ui-monospace, monospace; font-size: 12px; }\n\n/* Timeline (how it works) */\n.timeline { max-width: 760px; margin: 0 auto; position: relative; }\n.timeline::before { content:\"\"; position: absolute; left: 20px; top: 0; bottom: 0; width: 1px; background: var(--borde e-ish) */\n.rqa {\n  position: relative; max-width: 900px; margin: 0 auto;\n  aspect-ratio: 16 / 9;\n  background: var(--bg-soft); border-radius: var(--r-xl); overflow: hidden;\n  box-shadow: 0 1px 2px rgba(0,0,0,.04), 0 40px 80px -30px rgba(0,0,0,.2);\n}\n.rqa .act { position: absolute; inset: 0; padding: 56px; display: flex; flex-direction: column; justify-content: center; opacity: 0; transition: opacity .5s ease; }\n.rqa .act.on { opacity: 1; }\n.rqa .act .ey { font-size: 13px; color: var(--accent); margin-bottom: 18px; font-weight: 500; opacity: 0; transform: translateY(-6px); transition: opacity .5s, transform .5s; }\n.rqa .act.on .ey { opacity: 1; transform: none; }\n.rqa .act h3 { font-size: clamp(28px, 4vw, 48px); font-weight: 600; color: var(--ink); line-height: 1.05; letter-spacing: -0.035em; opacity: 0; transform: translateY(-6px); transition: opacity .5s, transform .5s; transition-delay: .1s; max-width: 18ch; }\n.rqa .act.on h3 { opacity: 1; transform: none; }\n.rqa .act .sub { color: var(--ink-3); font-size: 16px; margin-top: 20px; opacity: 0; transform: translateY(-6px); transition: opacity .5s, transform .5s; transition-delay: 2.8s; }\n.rqa .act.on .sub { opacity: 1; transform: none; }\n\n.rqa .grid-dots { display: grid; grid-template-columns: repeat(24, 1fr); gap: 6px; margin-top: 28px; max-width: 520px; opacity: 0; transition: opacity .5s ease; transition-delay: .4s; }\n.rqa .act.on .grid-dots { opacity: 1; }\n.rqa .grid-dots span { width: 100%; aspect-ratio: 1; background: var(--border); border-radius: 50%; transition: background-color .3s ease; }\n.rqa .grid-dots span.hi { background: var(--accent); }\n\n.rqa .act2-row { display: flex; gap: 32px; margin-top: 24px; align-items: flex-start; flex-wrap: wrap; }\n.rqa .bubbles { flex: 1; min-width: 260px; max-width: 400px; display: flex; flex-direction: column; gap: 10px; }\n.rqa .bubble { background: #fff; border-radius: 14px 14px 14px 4px; padding: 12px 16px; font-size: 14px; color: var(--ink); line-height: 1.45; border-left: 3px solid var(--accent); opacity: 0; transform: translateY(10px) scale(.98); transition: opacity .4s, transform .4s; box-shadow: 0 1px 2px rgba(0,0,0,.04); }\n.rqa .bubble.on { opacity: 1; transform: none; }\n.rqa .reply { align-self: flex-end; color: #fff; background: var(--accent); font-weight: 500; font-size: 13px; padding: 8px 16px; border-radius: 14px 14px 4px 14px; opacity: 0; transform: translateY(6px); transition: opacity .3s, transform .3s; }\n.rqa .reply.on { opacity: 1; transform: none; }\n.rqa .vtags { display: flex; flex-direction: column; gap: 14px; padding-top: 6px; }\n.rqa .vtag { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-3); opacity: .3; transition: opacity .4s; }\n.rqa .vtag.on { opacity: 1; }\n.rqa .vtag .vdot { width: 8px; height: 8px; border-radius: 50%; }\n\n.rqa .act3 { background: var(--bg-dark); color: #fff; align-items: center; justify-content: center; text-align: center; }\n.rqa .act3 h3 { color: #fff; }\n.rqa .act3 .money { font-size: clamp(72px, 10vw, 128px); font-weight: 600; color: #fff; letter-spacing: -0.05em; font-variant-numeric: tabular-nums; line-height: 1; opacity: 0; transform: translateY(-6px); transition: opacity .5s, transform .5s; transition-delay: .4s; }\n.rqa .act3.on .money { opacity: 1; transform: none; }\n.rqa .act3 .subline { color: rgba(255,255,255,.7); font-size: 17px; max-width: 380px; margin: 22px auto 0; opacity: 0; transform: translateY(-6px); transition: opacity .5s, transform .5s; transition-delay: 2.1s; }\n.rqa .act3.on .subline { opacity: 1; transform: none; }\n.rqa .act3 .closeblk { margin-top: 28px; opacity: 0; transform: translateY(-6px); transition: opacity .5s, transform .5s; transition-delay: 2.7s; display: flex; flex-direction: column; align-items: center; gap: 12px; }\n.rqa .act3.on .closeblk { opacity: 1; transform: none; }\n.rqa .act3 .wm { font-size: 22px; font-weight: 600; color: #fff; letter-spacing: -0.025em; }\n.rqa .act3 .wm .q { color: var(--accent-soft); }\n.rqa .act3 .tag { font-size: 11px; color: rgba(255,255,255,.5); letter-spacing: 0; }\n.rqa .progress { position: absolute; bottom: 0; left: 0; height: 2px; background: var(--accent); width: 0; }\n\n@media (max-width: 700px) {\n  .rqa .act { padding: 32px; }\n  .rqa .grid-dots { grid-template-columns: repeat(16, 1fr); }\n}\n\n</style>\n</head>\n<body>\n\n<section class=\"hero hero--short\">\n  <div class=\"container\">\n    <p class=\"breadcrumb\" data-anim=\"fade-up\">RecallQ / OptometryIQ</p>\n    <p class=\"eyebrow\" data-anim=\"fade-up\" style=\"color:#5A6470;\">RECALLQ FOR OPTOMETRY PRACTICES</p>\n    <h1 data-anim=\"fade-up\">The 2-year eye exam is the most missed appointment in Australian healthcare. OptometryIQ fixes that.</h1>\n    <p class=\"lead center\" data-anim=\"fade-up\">60% of Australians don't use their full optical rebate before it resets. OptometryIQ brings them back — and helps them unlock their allowance before it expires.</p>\n    <div class=\"ctas\" data-anim=\"fade-up\"><button class=\"btn btn--primary btn--lg\" data-start-now data-vertical=\"Optometry\">Start now</button></div>\n    <p class=\"trust-strip\" data-anim=\"fade-up\"><span>Built for optometry</span><span class=\"sep\">·</span><span>AU data residency</span><span class=\"sep\">·</span><span>Live in 20 minutes</span></p>\n  </div>\n</section>\n\n<section class=\"section section--white\">\n  <div class=\"container\">\n    <h2 class=\"text-center\" data-anim=\"fade-up\" style=\"margin-bottom:40px;\">Why optometry practices lose recall revenue.</h2>\n    <div class=\"grid-3\" data-stagger>\n      <div class=\"card\"><div class=\"ic\"><svg viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"3\"/><path d=\"M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z\"/></svg></div><h3>Two-year recall cycles are easy for patients to forget entirely.</h3><p style=\"color:var(--text-muted);font-size:14px;\">No reminder, no visit. The 24-month gap becomes 36, then 48.</p></div>\n      <div class=\"card\"><div class=\"ic\"><svg viewBox=\"0 0 24 24\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\" rx=\"2\"/><path d=\"M3 10h18M8 15h4\"/></svg></div><h3>Private health rebates reset — most patients don't realise.</h3><p style=\"color:var(--text-muted);font-size:14px;\">Unused allowance is lost revenue for both the patient and the practice.</p></div>\n      <div class=\"card\"><div class=\"ic\"><svg viewBox=\"0 0 24 24\"><path d=\"M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7H14a3.5 3.5 0 0 1 0 7H6\"/></svg></div><h3>At $280–400 per exam + frames, every missed recall matters.</h3><p style=\"color:var(--text-muted);font-size:14px;\">A single month of consistent recall recovers more than a year of ad spend.</p></div>\n    </div>\n  </div>\n</section>\n\n<section class=\"section\">\n  <div class=\"container\">\n    <h2 class=\"text-center\" data-anim=\"fade-up\" style=\"margin-bottom:32px;\">Built for optometry workflow.</h2>\n    <ul class=\"bullets\" style=\"max-width:560px;margin:0 auto;\">\n      <li>Works with Optomate, Sunix, iCare, Optiplus (CSV export)</li>\n      <li>Messages reference rebate reset dates and allowance expiry</li>\n      <li>Supports 6-month, 1-year, and 2-year recall windows by patient type</li>\n      <li>Handles pediatric recalls, diabetic review cycles, contact lens renewals</li>\n    </ul>\n  </div>\n</section>\n\n<section class=\"section section--dark\">\n  <div class=\"container text-center\">\n    <p data-anim=\"fade-up\" style=\"max-width:620px;margin:0 auto 24px;font-size:18px;line-height:1.6;\">A 2,000-patient optometry practice. 900 patients overdue. Recovery rate yields 63 bookings/month × $340 = <strong style=\"color:var(--periwinkle);\">$21,400/month recovered</strong>. OptometryIQ Growth plan: $ 1,799/month. Net: <strong style=\"color:var(--periwinkle);\">$19,601/month</strong>.</p>\n    <button class=\"btn btn--primary btn--lg\" data-start-now data-vertical=\"Optometry\">Start now — run this on my numbers</button>\n  </div>\n</section>\n\n<section class=\"section section--white\">\n  <div class=\"container\">\n    <h2 class=\"text-center\" data-anim=\"fade-up\" style=\"margin-bottom:32px;\">Optometry FAQ</h2>\n    <div class=\"faq\">\n      <details class=\"faq-item\" open><summary>Does it integrate with Optomate / Sunix / iCare?</summary><p class=\"a\">Yes — CSV export from any of them works out of the box.</p></details>\n      <details class=\"faq-item\"><summary>Can it reference private health rebate expiry dates?</summary><p class=\"a\">Yes — health fund + renewal month is a first-class variable.</p></details>\n      <details class=\"faq-item\"><summary>How does it handle different recall windows?</summary><p class=\"a\">Patient type controls the window — pediatric 1yr, adult 2yr, CL 6mo, diabetic 6–12mo.</p></details>\n      <details class=\"faq-item\"><summary>Can it flag patients due for diabetic retinal screening?</summary><p class=\"a\">Yes, as a separate cohort with its own cadence and wording.</p></details>\n      <details class=\"faq-item\"><summary>Will it work with my practice's frame promotions?</summary><p class=\"a\">Yes — seasonal promo text slots into the message variables.</p></details>\n      <details class=\"faq-item\"><summary>How fast can I go live?</summary><p class=\"a\">Under 20 minutes from CSV upload.</p></details>\n    </div>\n  </div>\n</section>\n\n<section class=\"cta-band\">\n  <div class=\"container\" data-stagger>\n    <h2>Ready to see OptometryIQ on your patient data?</h2>\n    <p>15 minutes. Your real numbers. No credit card.</p>\n    <div><button class=\"btn btn--primary btn--lg\" data-start-now data-vertical=\"Optometry\">Start now</button></div>\n  </div>\n</section>\n\n<script>\n/* RecallQ — animation helpers (vanilla, framer-motion-free) */\n(function () {\n  'use strict';\n  const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n  const io = new IntersectionObserver((entries) => {\n    entries.forEach(e => {\n      if (e.isIntersecting) {\n        const el = e.target;\n        // Force reflow so the transition starts from the pre-class initial state,\n        // avoiding a stuck \"pending\" transition in backgrounded/iframed load.\n        // eslint-disable-next-line no-unused-expressions\n        el.offsetHeight;\n        el.classList.add('in');\n        // per-child delays for staggered containers\n        if (el.hasAttribute('data-stagger')) {\n          const kids = el.children;\n          for (let i = 0; i < kids.length; i++) {\n            kids[i].style.transitionDelay = prefersReduced ? '0s' : (0.1 + i * 0.12) + 's';\n          }\n        }\n        // Fallback: finish stalled transitions after 900ms so opacity never sticks at 0.\n        setTimeout(() => {\n          const targets = el.hasAttribute('data-stagger') ? [el, ...el.children] : [el];\n          targets.forEach(t => {\n            if (t.getAnimations) {\n              t.getAnimations().forEach(a => {\n                if (a.playState === 'running' && a.startTime == null) { try { a.finish(); } catch(err){} }\n              });\n            }\n          });\n        }, 900);\n        io.unobserve(el);\n      }\n    });\n  }, { rootMargin: '-80px', threshold: 0.01 });\n\n  function register(root = document) {\n    root.querySelectorAll('[data-anim], [data-stagger]').forEach(el => {\n      if (el.dataset.animOn) return;\n      el.dataset.animOn = '1';\n      io.observe(el);\n    });\n  }\n\n  // Stagger on mount (hero): add 'hero-in' class which matches same rules\n  function mountStagger(root) {\n    const els = root.querySelectorAll('[data-mount]');\n    els.forEach((el, i) => {\n      el.style.transitionDelay = prefersReduced ? '0s' : (i * 0.1) + 's';\n      requestAnimationFrame(() => el.classList.add('in'));\n    });\n    // Safety: finish any stuck transitions (happens in backgrounded/iframed loads)\n    setTimeout(() => {\n      els.forEach(el => {\n        if (el.getAnimations) {\n          el.getAnimations().forEach(a => {\n            if (a.playState === 'running' && (a.currentTime === 0 || a.startTime == null)) {\n              try { a.finish(); } catch (err) {}\n            }\n          });\n        }\n      });\n    }, 1200);\n  }\n\n  function countUp(el, target, duration = 1800, prefix = '', suffix = '') {\n    if (prefersReduced) {\n      el.textContent = prefix + Math.round(target).toLocaleString() + suffix;\n      return;\n    }\n    const start = performance.now();\n    function frame(now) {\n      const t = Math.min((now - start) / duration, 1);\n      const eased = 1 - Math.pow(1 - t, 3);\n      const val = Math.round(target * eased);\n      el.textContent = prefix + val.toLocaleString() + suffix;\n      if (t < 1) requestAnimationFrame(frame);\n    }\n    requestAnimationFrame(frame);\n  }\n\n  function observeCount(el, target, opts = {}) {\n    const obs = new IntersectionObserver((entries) => {\n      entries.forEach(e => {\n        if (e.isIntersecting) {\n          countUp(el, target, opts.duration, opts.prefix, opts.suffix);\n          obs.unobserve(el);\n        }\n      });\n    }, { rootMargin: '-40px' });\n    obs.observe(el);\n  }\n\n  window.RQA = { register, mountStagger, countUp, observeCount, prefersReduced };\n\n  function init() {\n    register();\n    document.querySelectorAll('[data-mount-stagger]').forEach(c => mountStagger(c));\n    // Safety net: if for any reason transitions don't fire (background tab,\n    // bundled blob-script timing, etc.), force-reveal everything after 1.5s\n    // by disabling transitions and applying the end state directly.\n    setTimeout(() => {\n      document.querySelectorAll('[data-mount], [data-anim], [data-stagger]').forEach(el => {\n        const op = parseFloat(getComputedStyle(el).opacity);\n        if (op < 0.99) {\n          el.style.transition = 'none';\n          el.style.opacity = '1';\n          el.style.transform = 'none';\n          el.classList.add('in');\n        }\n      });\n    }, 1500);\n  }\n  if (document.readyState === 'loading') {\n    document.addEventListener('DOMContentLoaded', init);\n  } else {\n    init();\n  }\n  // Belt-and-braces: also run on window load in case DOMContentLoaded fired before this script.\n  window.addEventListener('load', () => {\n    if (!document.querySelector('[data-mount].in')) init();\n  });\n})();\n\n<\/script>\n<script data-active=\"optometry\" data-vertical=\"Optometry\">\n/* RecallQ — header, footer, Start Now modal\n   Usage: <script src=\"assets/partials.js\"\n          data-active=\"home|dentistry|physio|optometry|how|pricing|about|legal\"\n          data-vertical=\"Dentistry|Physio|Optometry\" (optional modal preset)\n          data-depth=\"0|1\"><\\/script>\n*/\n(function () {\n  const me = document.currentScript;\n  const active = me?.dataset.active || '';\n  const vPreset = me?.dataset.vertical || '';\n  const depth = (parseInt(me?.dataset.depth || '0', 10)) || 0;\n  const up = '../'.repeat(depth);\n  const ver = '?v=g1';\n\n  // HEADER\n  const hdr = document.createElement('div');\n  hdr.innerHTML = `\n    <header class=\"site-header\" id=\"siteHeader\">\n      <div class=\"container hdr-inner\">\n        <a class=\"wordmark\" href=\"${up}index.html\" aria-label=\"RecallQ home\">Recall<span class=\"q\">Q</span></a>\n        <nav class=\"nav\" aria-label=\"Primary\">\n          <div class=\"nav-dd\">\n            <button aria-haspopup=\"true\" aria-expanded=\"false\">Solutions</button>\n            <div class=\"nav-dd-menu\" role=\"menu\">\n              <a href=\"${up}dentistry.html\"><span class=\"dot\" style=\"background:#5C5A54\"></span><span><strong>DentistryIQ</strong><span class=\"sub-desc\">Recall for dental practices</span></span></a>\n              <a href=\"${up}physio.html\"><span class=\"dot\" style=\"background:#7A6A5C\"></span><span><strong>PhysioIQ</strong><span class=\"sub-desc\">Recall for physiotherapy</span></span></a>\n              <a href=\"${up}optometry.html\"><span class=\"dot\" style=\"background:#5A6470\"></span><span><strong>OptometryIQ</strong><span class=\"sub-desc\">Recall for optometry</span></span></a>\n            </div>\n          </div>\n          <a href=\"${up}how-it-works.html\">How it works</a>\n          <a href=\"${up}pricing.html\">Pricing</a>\n          <a href=\"${up}about.html\">About</a>\n        </nav>\n        <button class=\"btn btn--primary\" data-start-now>Start now</button>\n        <button class=\"hamb\" aria-label=\"Menu\" id=\"hambBtn\"><span></span></button>\n      </div>\n      <div class=\"mobile-menu\" id=\"mobileMenu\">\n        <ul>\n          <li><a href=\"${up}dentistry.html\"><span class=\"dot\" style=\"background:#5C5A54;margin-right:8px;display:inline-block;\"></span>DentistryIQ</a></li>\n          <li><a href=\"${up}physio.html\"><span class=\"dot\" style=\"background:#7A6A5C;margin-right:8px;display:inline-block;\"></span>PhysioIQ</a></li>\n          <li><a href=\"${up}optometry.html\"><span class=\"dot\" style=\"background:#5A6470;margin-right:8px;display:inline-block;\"></span>OptometryIQ</a></li>\n          <li><a href=\"${up}how-it-works.html\">How it works</a></li>\n          <li><a href=\"${up}pricing.html\">Pricing</a></li>\n          <li><a href=\"${up}about.html\">About</a></li>\n          <li><button data-start-now style=\"color:var(--periwinkle-dark);font-weight:500;\">Start now →</button></li>\n        </ul>\n      </div>\n    </header>\n  `;\n  document.body.insertBefore(hdr.firstElementChild, document.body.firstChild);\n  // Double-rAF + forced reflow to guarantee the transition starts from the initial state.\n  // Without this, iframes that are backgrounded on load can stall the transition in\n  // \"pending\" state (playState:running, startTime:null) and opacity stays at 0 forever.\n  const hdrEl = document.getElementById('siteHeader');\n  requestAnimationFrame(() => requestAnimationFrame(() => {\n    // Force reflow\n    // eslint-disable-next-line no
